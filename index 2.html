<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Majorka 2026</title>
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f6f6f3">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f1113">
<meta name="color-scheme" content="light dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Majorka">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="favicon-64.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Schibsted+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f6f6f3; --bg2:#fbfbf9; --card:#ffffff; --ink:#16171b; --muted:#787b82;
    --line:#ecebe6; --line-2:#f1f0ec;
    --accent:#0e8c7c; --accent-d:#0a6358; --accent-soft:#e6f3f0;
    --coral:#f1875a; --coral-soft:#fcefe7;
    --amber:#e8a23a; --amber-soft:#fbf2dc;
    --green:#2f9e6b;
    --r:20px; --r-sm:14px;
    --shadow:0 1px 2px rgba(20,22,26,.04), 0 10px 30px -20px rgba(20,22,26,.25);
    --shadow-lg:0 2px 6px rgba(20,22,26,.05), 0 24px 50px -28px rgba(20,22,26,.30);
    --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
    color-scheme:light dark;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg)}
  body{
    font-family:'Schibsted Grotesk',system-ui,sans-serif;
    background:var(--bg); color:var(--ink);
    -webkit-font-smoothing:antialiased; line-height:1.5; letter-spacing:-.005em;
    overscroll-behavior-y:none;
  }
  body::before{
    content:""; position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:
      radial-gradient(80% 50% at 85% -5%, rgba(14,140,124,.07), transparent 60%),
      radial-gradient(70% 40% at 0% 8%, rgba(241,135,90,.06), transparent 55%);
  }
  .app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

  /* Header — airy, light */
  header{padding:calc(var(--safe-top) + 22px) 22px 6px;position:relative}
  .eyebrow{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--muted);font-weight:600}
  .eyebrow .sun{width:9px;height:9px;border-radius:50%;background:var(--coral)}
  h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:40px;line-height:.98;
    margin:8px 0 10px;letter-spacing:-.025em}
  .meta-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-size:13px;color:var(--muted)}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--line);
    padding:6px 11px;border-radius:999px;font-size:12.5px;font-weight:600;color:var(--ink);box-shadow:var(--shadow)}
  .chip .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}

  .phase{display:flex;gap:9px;padding:16px 22px 6px}
  .phase .pill{flex:1;background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:11px 13px 11px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .phase .pill::after{content:"";position:absolute;left:0;top:0;bottom:0;width:4px}
  .phase .pill.p1::after{background:var(--coral)} .phase .pill.p2::after{background:var(--accent)}
  .phase .pill b{display:block;color:var(--ink);font-size:13px;font-weight:700;letter-spacing:-.01em}
  .phase .pill span{font-size:11.5px;color:var(--muted)}

  main{flex:1;padding:6px 16px calc(110px + var(--safe-bot))}
  section{display:none}
  section.active{display:block}
  section.active>*{opacity:0;transform:translateY(10px);animation:rise .5s cubic-bezier(.22,1,.36,1) forwards}
  section.active>*:nth-child(1){animation-delay:.02s}
  section.active>*:nth-child(2){animation-delay:.07s}
  section.active>*:nth-child(3){animation-delay:.12s}
  section.active>*:nth-child(n+4){animation-delay:.16s}
  @keyframes rise{to{opacity:1;transform:none}}

  .sec-head{padding:18px 6px 6px}
  .sec-head .day{font-size:12px;font-weight:600;color:var(--accent);letter-spacing:.02em;text-transform:uppercase}
  .sec-head h2{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:28px;margin:6px 0 4px;letter-spacing:-.02em}
  .sec-head p{margin:0;color:var(--muted);font-size:14px}

  /* Base card */
  .base{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    padding:18px;box-shadow:var(--shadow);margin:14px 0 6px}
  .base h3{font-family:'Bricolage Grotesque',sans-serif;font-size:21px;margin:0 0 3px;font-weight:700;letter-spacing:-.015em}
  .base .sub{color:var(--muted);font-size:13px;margin-bottom:12px}
  .kv{display:flex;gap:10px;font-size:13.5px;padding:8px 0;border-top:1px solid var(--line-2)}
  .kv:first-of-type{border-top:none;padding-top:2px}
  .kv .k{color:var(--muted);min-width:78px;font-weight:500}
  .kv .v{font-weight:600}
  .stars{color:var(--amber);letter-spacing:1px;font-size:15px}

  /* Timeline */
  .timeline{position:relative;margin:8px 0 0;padding-left:4px}
  .step{position:relative;padding:0 0 12px 32px}
  .step::before{content:"";position:absolute;left:11px;top:26px;bottom:-2px;width:2px;background:var(--line)}
  .step:last-child::before{display:none}
  .node{position:absolute;left:0;top:6px;width:23px;height:23px;border-radius:50%;background:var(--card);
    border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;
    color:var(--accent);z-index:1;box-shadow:var(--shadow)}
  .step.done .node{background:var(--accent);border-color:var(--accent);color:#fff}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:14px;box-shadow:var(--shadow);transition:opacity .25s}
  .step.done .card{opacity:.55}
  .time-chip{display:inline-flex;align-items:center;gap:6px;font-weight:700;font-size:12.5px;color:var(--accent-d);
    background:var(--accent-soft);padding:4px 10px;border-radius:8px;margin-bottom:9px;letter-spacing:-.01em}
  .card h4{margin:0 0 3px;font-size:16.5px;font-weight:700;letter-spacing:-.015em}
  .card .where{font-size:13px;color:var(--muted);margin-bottom:8px}
  .card ul{margin:8px 0 0;padding-left:18px;font-size:13px;color:#4a4d54}
  .card ul li{margin:3px 0}
  .badge{display:inline-block;font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:9px;margin:8px 7px 0 0;line-height:1.35}
  .b-warn{background:var(--coral-soft);color:#b65a32;border:1px solid #f6dccb}
  .b-tip{background:var(--accent-soft);color:var(--accent-d);border:1px solid #cfe9e3}
  .b-conf{background:#f4f4f1;color:var(--ink);border:1px solid var(--line);cursor:pointer;font-family:inherit}
  .b-conf:active{transform:scale(.97)}
  a.badge{text-decoration:none}
  .actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .btn{flex:1;min-width:110px;text-align:center;text-decoration:none;font-size:13px;font-weight:600;
    padding:10px 12px;border-radius:12px;border:1px solid var(--line);background:var(--bg2);color:var(--ink);
    display:inline-flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:transform .1s,background .2s}
  .btn-map{background:var(--ink);color:var(--bg);border-color:var(--ink)}
  .btn-check.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn:active{transform:scale(.97)}

  /* Segmented control */
  .seg{display:flex;gap:4px;background:#eeeeea;border-radius:14px;padding:4px;margin:16px 0 14px}
  .seg button{flex:1;border:none;background:transparent;font-family:inherit;font-size:12px;font-weight:600;
    color:var(--muted);padding:9px 3px;border-radius:10px;cursor:pointer;white-space:nowrap;transition:.2s;letter-spacing:-.01em}
  .seg button.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}

  /* Place cards */
  .place{background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:15px;margin-bottom:11px;box-shadow:var(--shadow);transition:transform .12s}
  .place:active{transform:scale(.992)}
  .place .top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
  .place h4{margin:0;font-size:17px;font-weight:700;line-height:1.15;letter-spacing:-.02em}
  .rate{flex:none;display:inline-flex;align-items:center;gap:4px;font-size:12.5px;font-weight:700;color:#8a6516;
    background:var(--amber-soft);border:1px solid #f0e1b8;padding:4px 9px;border-radius:10px;white-space:nowrap}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin:9px 0 0}
  .tag{font-size:11.5px;font-weight:600;color:var(--muted);background:#f3f2ee;border-radius:8px;padding:3px 9px}
  .tag.dist{background:var(--accent-soft);color:var(--accent-d)}
  .tag.eur{background:#eef6f0;color:var(--green)}
  .tag.shut{background:var(--coral-soft);color:#b65a32}
  .place p.note,.base p.note{margin:10px 0 0;font-size:13.5px;color:#4a4d54;line-height:1.5}
  .place .actions{margin-top:12px}
  .bike-note{margin-top:14px}
  .bike-note h3{font-size:18px}

  /* Floating nav */
  footer.nav{
    position:fixed;left:0;right:0;bottom:0;z-index:20;max-width:520px;margin:0 auto;
    padding:0 14px calc(12px + var(--safe-bot));pointer-events:none;
  }
  .navbar{
    pointer-events:auto;display:flex;gap:2px;background:rgba(255,255,255,.78);
    backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px) saturate(1.4);
    border:1px solid rgba(20,22,26,.06);border-radius:22px;padding:7px 6px;box-shadow:var(--shadow-lg);
  }
  .navbar button{
    flex:1;border:none;background:transparent;font-family:inherit;cursor:pointer;color:var(--muted);
    padding:7px 2px 6px;border-radius:15px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:.22s
  }
  .navbar .ico{font-size:18px;line-height:1;transition:transform .22s}
  .navbar .lab{font-size:9.5px;font-weight:600;letter-spacing:.005em}
  .navbar button.on{background:var(--ink);color:#fff}
  .navbar button.on .ico{transform:translateY(-1px) scale(1.05)}

  .toast{position:fixed;left:50%;bottom:calc(100px + var(--safe-bot));transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;font-size:13px;font-weight:600;padding:10px 18px;border-radius:999px;
    opacity:0;transition:.28s cubic-bezier(.22,1,.36,1);z-index:50;pointer-events:none;box-shadow:var(--shadow-lg)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ---------- Dark theme ---------- */
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0f1113; --bg2:#15181b; --card:#1a1d21; --ink:#f2f3f0; --muted:#9aa1a9;
      --line:#2a2e34; --line-2:#23272c;
      --accent:#3fcab4; --accent-d:#7fe6d6; --accent-soft:rgba(63,202,180,.15);
      --coral:#f3936a; --coral-soft:rgba(243,147,106,.16);
      --amber:#eab24f; --amber-soft:rgba(234,178,79,.16);
      --green:#52c98e;
      --shadow:0 1px 2px rgba(0,0,0,.4), 0 12px 30px -20px rgba(0,0,0,.7);
      --shadow-lg:0 2px 8px rgba(0,0,0,.5), 0 28px 60px -30px rgba(0,0,0,.8);
    }
    .seg{background:var(--line-2)}
    .tag{background:var(--line-2);color:var(--muted)}
    .tag.eur{background:rgba(82,201,142,.14);color:var(--green)}
    .tag.dist{color:var(--accent-d)}
    .tag.shut{color:var(--coral)}
    .b-conf{background:var(--bg2);color:var(--ink);border-color:var(--line)}
    .b-warn{color:var(--coral);border-color:rgba(243,147,106,.3)}
    .b-tip{color:var(--accent-d);border-color:rgba(63,202,180,.3)}
    .rate{color:var(--amber);border-color:rgba(234,178,79,.3)}
    .place p.note,.base p.note,.card ul{color:#c3c8ce}
    .btn{background:var(--bg2)}
    .navbar{background:rgba(26,29,33,.82);border-color:rgba(255,255,255,.07)}
    .navbar button.on{background:var(--accent);color:#06241f}
    .navbar button.on .ico{filter:none}
    .chip .dot{box-shadow:0 0 0 3px var(--accent-soft)}
    /* Fix cascade: btn-map must beat generic .btn override in dark */
    .btn-map{background:var(--ink);color:var(--bg);border-color:var(--ink)}
    .btn-check.on{background:var(--accent);color:#08251e;border-color:var(--accent)}
    .step.done .node{background:var(--accent);border-color:var(--accent);color:#08251e}
    .toast{background:#e4f6f3;color:var(--accent-d)}
  }
  .tag.gem{background:rgba(63,202,180,.15);color:var(--accent-d)}
  @media(prefers-color-scheme:dark){.tag.gem{background:rgba(63,202,180,.18);color:var(--accent-d)}}

  .btn-pod{background:var(--accent);color:#06241f;border-color:var(--accent)}
  .modal{position:fixed;inset:0;z-index:60;display:none;align-items:flex-end;justify-content:center;
    background:rgba(8,10,12,.55);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px)}
  .modal.open{display:flex}
  .modal-card{background:var(--card);width:100%;max-width:520px;max-height:90vh;display:flex;flex-direction:column;
    border-radius:24px 24px 0 0;border:1px solid var(--line);box-shadow:var(--shadow-lg);
    animation:sheet .38s cubic-bezier(.22,1,.36,1)}
  @keyframes sheet{from{transform:translateY(100%)}to{transform:none}}
  .modal-head{display:flex;align-items:center;gap:10px;padding:18px 18px 8px}
  .modal-head h3{font-family:'Bricolage Grotesque',sans-serif;font-size:20px;margin:0;flex:1;letter-spacing:-.02em;line-height:1.1}
  .modal-head button{border:none;background:var(--bg2);color:var(--muted);width:34px;height:34px;border-radius:50%;
    font-size:15px;cursor:pointer;flex:none}
  .modal-meta{padding:0 18px 8px;color:var(--muted);font-size:11.5px;font-weight:600;letter-spacing:.01em;
    text-transform:uppercase;border-bottom:1px solid var(--line-2)}
  .modal-body{padding:14px 18px;overflow-y:auto;font-size:14.5px;line-height:1.62;white-space:pre-wrap;
    color:#3c4148;-webkit-overflow-scrolling:touch;flex:1}
  @media(prefers-color-scheme:dark){.modal-body{color:#cfd3d8}}
  .modal-foot{padding:12px 16px calc(16px + var(--safe-bot));border-top:1px solid var(--line-2)}
  .modal-foot .btn{width:100%}
  /* cycling routes */
  .rt-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 14px 12px;margin-bottom:12px}
  .rt-head{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
  .rt-head h4{margin:0;font-size:15px;font-weight:700;letter-spacing:-.02em;flex:1;line-height:1.2}
  .rt-diff{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap;margin-top:2px}
  .rt-diff.easy{background:#dcfce7;color:#166534}
  .rt-diff.mod{background:#fef9c3;color:#854d0e}
  .rt-diff.hard{background:#fee2e2;color:#991b1b}
  @media(prefers-color-scheme:dark){
    .rt-diff.easy{background:rgba(34,197,94,.18);color:#86efac}
    .rt-diff.mod{background:rgba(234,179,8,.18);color:#fde047}
    .rt-diff.hard{background:rgba(239,68,68,.18);color:#fca5a5}
  }
  .rt-stats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
  .rt-stat{font-size:11.5px;font-weight:600;color:var(--muted);background:var(--bg2);padding:3px 9px;border-radius:20px}
  .rt-note{font-size:13.5px;color:var(--muted);line-height:1.5;margin:0 0 10px}
  .rt-pts{font-size:12px;color:var(--muted);margin-bottom:10px}
  .rt-pts span{color:var(--accent);font-weight:700}
  /* route modal */
  #rteModal .modal-card{max-height:94vh}
  .rte-map{height:240px;border-radius:10px;overflow:hidden;margin:.4rem 0 .8rem;background:var(--bg2)}
  .rte-pts-list{font-size:13px;color:var(--muted);line-height:1.8;padding:0 0 4px}
  .rte-pts-list li{list-style:none;padding-left:18px;position:relative}
  .rte-pts-list li::before{content:'→';position:absolute;left:0;color:var(--accent);font-weight:700}
  .rte-pts-list li:first-child::before{content:'🚴'}
  .rte-pts-list li:last-child::before{content:'🏁'}

</style>
</head>
<body>
<div class="app">
  <header>
    <div class="eyebrow"><span class="sun"></span> Wyjazd rodzinny</div>
    <h1>Majorka 2026</h1>
    <div class="meta-row">
      <span class="chip">🗓️ 6 – 18 czerwca</span>
      <span class="chip"><span class="dot"></span><span id="cd">—</span></span>
    </div>
  </header>

  <main id="main"></main>

  <footer class="nav"><div class="navbar" id="nav"></div></footer>
  <div class="toast" id="toast"></div>

  <div class="modal" id="podModal">
    <div class="modal-card">
      <div class="modal-head"><h3 id="podTitle"></h3><button id="podClose" aria-label="Zamknij">✕</button></div>
      <div class="modal-meta">🎧 Skrypt podcastu · ok. 5 min · wklej do ElevenReader</div>
      <div class="modal-body" id="podBody"></div>
      <div class="modal-foot"><button id="podCopy" class="btn btn-map">📋 Kopiuj tekst podcastu</button></div>
    </div>
  </div>
</div>

<div id="rteModal" class="modal" role="dialog" aria-modal="true">
  <div class="modal-card">
    <div class="modal-head">
      <h3 id="rteTitle">Trasa</h3>
      <button id="rteClose" aria-label="Zamknij">✕</button>
    </div>
    <div id="rteMeta" class="rt-stats" style="padding:0 18px 6px"></div>
    <div style="padding:0 18px">
      <div id="rteMap" class="rte-map"></div>
      <ul id="rtePts" class="rte-pts-list"></ul>
    </div>
    <div class="modal-foot" style="display:flex;gap:8px">
      <a id="rteGmaps" class="btn btn-map" target="_blank" rel="noopener" style="flex:1;text-align:center;text-decoration:none">🗺️ Nawigacja</a>
      <button id="rteCloseBtn" class="btn" style="flex:0 0 auto">Zamknij</button>
    </div>
  </div>
</div>

<script>
/* ---------- DATA ---------- */
const maps = (q) => "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(q);
const websearch = (q) => "https://www.google.com/search?q=" + encodeURIComponent(q);
const gimg = (q) => "https://www.google.com/search?tbm=isch&q=" + encodeURIComponent(q);
const TABS = [
  {id:"arr", ico:"☀️", lab:"Przylot", type:"logi",
   day:"Sobota · 6 czerwca", title:"Przylot na Majorkę", sub:"Lot, odbiór auta i dojazd do finca.",
   steps:[
     {time:"10:10 → 13:05", title:"Lot FR 955 · Poznań → Palma", where:"Ryanair · bezpośredni, 2 godz 55 min",
      conf:"FR 955",
      list:["Odprawa online w myRyanair przed wyjazdem.","Status na dziś: Na czas. Bramka — sprawdź w aplikacji."]},
     {time:"po 13:05", title:"Odbiór auta · Toyota Proace (7 miejsc)", where:"Record Go · lotnisko Palma (PMI) · skrzynia manualna",
      conf:"voucher Record Go",
      list:["Record Go działa z dojazdem busem spod terminalu — licz realnie 45–60 min od lądowania do kierownicy.","Nominalny czas w rezerwacji: 13:30, ale odbierzesz po dotarciu — bez stresu."],
      warn:"Przy odbiorze: prawo jazdy, karta KREDYTOWA na kaucję, voucher, paszport/dowód. Bez kompletu nie wydadzą auta.",
      mapq:"Record Go Palma de Mallorca Airport"},
     {time:"~45 min", title:"Dojazd PMI → Finca Can Puput", where:"Campanet · ok. 50 km autostradą Ma-13",
      tip:"Zrób zakupy po drodze (Eroski/Mercadona w Inca lub Sa Pobla) — finca jest na uboczu.",
      mapq:"Finca Can Puput Campanet Mallorca"},
     {time:"15:00 – 20:00", title:"Zameldowanie w finca", where:"Okno przyjazdu wg Holidu",

   poi:[
     {n:"Coves de Campanet", r:4.5, d:"5 min", note:"Jaskinie tuż obok bazy — spokojnie, własnym tempem, bez tłumów. Świetne dla dzieci. Czynne 10–17.", q:"Coves de Campanet", pod:`Zacznijmy od miejsca, które masz dosłownie za progiem — pięć minut od finca. Coves de Campanet to jaskinie, które przez miliony lat czekały w ciemności, aż ktoś je odkryje. A odkryto je całkiem niedawno i zupełnie przypadkiem.

Był rok tysiąc dziewięćset czterdziesty piąty. Grupa robotników kopała w tym zboczu w poszukiwaniu wody — rzeczy na suchej wyspie bezcennej. Zamiast źródła natrafili na szczelinę, a za nią na pustkę. Spuścili światło i oniemieli: pod ich stopami otwierał się cały podziemny świat sal, kolumn i kamiennych firanek, którego żadne ludzkie oko nigdy wcześniej nie widziało. Trzy lata później, w tysiąc dziewięćset czterdziestym ósmym, jaskinie udostępniono zwiedzającym.

Coves de Campanet są mniejsze i spokojniejsze niż wielkie, oblegane jaskinie wschodniego wybrzeża — i właśnie w tym tkwi ich urok. Nie ma tu tłoku, jest za to coś, czym specjaliści zachwycają się szczególnie: wyjątkowo cienkie, długie i delikatne stalaktyty, kruche jak szkło, niektóre cienkie niemal jak makaron. Powstawały krople po kropli, przez dziesiątki tysięcy lat, w idealnym bezruchu. Zobaczysz też podziemne jeziorko, w którego nieruchomej tafli odbijają się formacje, oraz sale, w których przewodnik na chwilę gasi światła — i wtedy pojmujesz, czym jest prawdziwa, absolutna ciemność.

Jest tu też ślad znacznie starszej historii. W jaskiniach Majorki znajdowano kości Myotragus balearicus — niezwykłego, wymarłego zwierzęcia, karłowatej kozioantylopy, która żyła wyłącznie na tych wyspach i nigdzie indziej na świecie. Przetrwała tu w izolacji tysiące lat, a wyginęła mniej więcej wtedy, gdy na wyspę przybyli pierwsi ludzie. Schodząc w głąb tej skały, wkraczasz więc w miejsce, które pamięta świat sprzed człowieka.

W środku panuje stały chłód, jakieś osiemnaście do dwudziestu stopni, niezależnie od upału na zewnątrz — w gorący dzień to przyjemna odmiana. Zwiedzanie z przewodnikiem trwa około trzech kwadransów, ścieżka jest oświetlona i wygodna, choć miejscami wilgotna. Dla dzieci to wielka frajda: schody w dół, echo, gra świateł i poczucie schodzenia do tajemniczego, ukrytego świata.

Praktycznie: jaskinie są czynne na ogół od rana do późnego popołudnia, a z finca masz tu dosłownie parę minut autem. Załóż buty z dobrą podeszwą, bo kamień bywa śliski. Tuż obok, przy samym wejściu, działa restauracja z grillem na żywym ogniu i tarasem widokowym — łatwo połączyć podziemną wędrówkę z dobrym obiadem.

Kiedy wyjdziesz z powrotem na słońce, pomyśl o tych robotnikach z czterdziestego piątego roku, którzy szukali wody, a znaleźli ukryty pałac z kamienia. Czasem największe skarby leżą tuż pod naszymi stopami — wystarczy kopnąć odrobinę głębiej, niż planowaliśmy. A ty masz ten skarb na wyciągnięcie ręki, zaraz obok domu.`},
     {n:"Fonts Ufanes", r:4.7, d:"6 min", note:"Cienisty leśny spacer, łatwy z dziećmi i wózkiem. Zjawisko wypływającej wody zwykle dopiero po ulewach — w czerwcu raczej sucho, ale las i tak piękny.", q:"Fonts Ufanes Campanet", pod:`Opowiem ci teraz o zjawisku tak niezwykłym, że objęto je ochroną jako pomnik przyrody — i o miejscu, które jest piękne nawet wtedy, gdy owo zjawisko nie zachodzi. Mowa o Fonts Ufanes, leśnych źródłach ukrytych w dębowym gaju nieopodal Campanet.

W większości miejsc na świecie źródło to konkretny punkt: szczelina w skale, z której sączy się woda. Fonts Ufanes działają inaczej — i to czyni je ewenementem. Po obfitych deszczach woda nie wypływa tu z jednego miejsca, lecz nagle, niemal jednocześnie, wzbiera z całego dna lasu. Spod ziemi, spomiędzy korzeni starych dębów ostrolistnych, w dziesiątkach miejsc naraz, zaczyna bić woda, jakby las sam postanowił zamienić się w rzekę. W ciągu kilku godzin spokojny gaj przeobraża się w sieć strumieni i rozlewisk, by po kilku dniach równie nagle wszystko ucichło.

Skąd ta woda? To dar gór. Deszcz spadający na masyw Puig Tomir i okoliczne zbocza wsiąka w wapienne skały, wędruje pod ziemią całymi kilometrami, a tutaj, gdzie warstwy geologiczne układają się w odpowiedni sposób, znajduje ujście i wydostaje się na powierzchnię. Zjawisko jest kapryśne i nieprzewidywalne — zależy wprost od tego, ile i jak intensywnie padało. To dlatego w czerwcu, w pełni lata, najprawdopodobniej zastaniesz las suchy. I właśnie dlatego warto wiedzieć z góry: jedziesz tu nie tyle dla wody, ile dla samego miejsca.

A miejsce jest urzekające niezależnie od pory roku. To rozległy, cienisty las dębów ostrolistnych — encinar — jeden z najpiękniejszych na wyspie. Ścieżki są łagodne, płaskie i dobrze utrzymane, idealne na spokojny, rodzinny spacer z dala od słońca, które w innych miejscach Majorki potrafi zmęczyć. Pod nogami chrzęszczą liście i żołędzie, w koronach śpiewają ptaki, a powietrze pachnie ziemią i drewnem. To las z gatunku tych, w których po prostu dobrze się oddycha.

Gaj należy do dawnej posiadłości Gabellí, a całość objęto ochroną na początku dwudziestego pierwszego wieku właśnie ze względu na to unikatowe zjawisko hydrologiczne — jedyne takie na Balearach.

Praktycznie: wejście jest bezpłatne, a z finca masz tu naprawdę blisko, kilka minut autem. Spacer do źródeł i z powrotem zajmuje około pół godziny w spokojnym tempie. Załóż wygodne buty — po deszczu ścieżki bywają błotniste i śliskie. Weź wodę i, jeśli masz, lornetkę dla dzieci, bo w lesie sporo ptaków. To świetny pomysł na poranek albo na chłodniejsze popołudnie, zwłaszcza w upalny dzień, gdy szukasz cienia.

A gdybyś miał wielkie szczęście i trafił tu tuż po jesiennej czy wiosennej ulewie — zobaczysz coś, czego większość turystów nigdy nie ujrzy: las, który zamienia się w wodę. Ale nawet bez tego Fonts Ufanes to cicha, zielona kryjówka, w której na chwilę zwalniasz, oddychasz głębiej i przypominasz sobie, że Majorka to nie tylko plaże i słońce, ale też stare lasy pełne tajemnic.`},
     {n:"Pollença — starówka", r:4.4, d:"~20 min", note:"Most Rzymski, schody Calvari (365 stopni z widokiem), darmowe Museu de Pollença, klimatyczne uliczki i kawiarnie.", q:"Pollença old town Mallorca", pod:`Niektóre miasta zwiedza się oczami. Pollençę zwiedza się nogami — wspinając się po jej najsłynniejszych schodach. Ale po kolei, bo to jedno z najpiękniejszych i najbardziej klimatycznych miasteczek północnej Majorki, ukryte u stóp gór Tramuntany, około dwudziestu minut od finca.

Zacznijmy od jego symbolu: Calvari, Kalwarii. To prosta, kamienna droga prowadząca stromo w górę, schodami obsadzonymi po bokach starymi cyprysami, aż do niewielkiej kaplicy na szczycie wzgórza. Stopni jest, jak głosi tradycja, trzysta sześćdziesiąt pięć — po jednym na każdy dzień roku. Wejdź na górę, nawet jeśli zabraknie ci tchu; widok na dachy miasteczka i okoliczne wzgórza wynagradza każdy stopień. A teraz wyobraź sobie to miejsce w Wielki Piątek, nocą. Co roku odbywa się tu Davallament — obrzęd zdjęcia z krzyża. W całkowitej ciszy, przy świetle pochodni, figurę Chrystusa znosi się po tych schodach w dół, a tłum odprowadza ją bez słowa. To jedna z najbardziej przejmujących, niemal mrocznych ceremonii na całej wyspie.

Pollença ma też swoją wojenną pamięć. W tysiąc pięćset pięćdziesiątym roku miasteczko najechał osławiony korsarz Dragut — jeden z najgroźniejszych piratów Morza Śródziemnego. Mieszkańcy stawili opór i obronili miasto, a pamięć o tej walce żyje do dziś w jednym z najhuczniejszych świąt wyspy: na początku sierpnia odbywa się tu inscenizacja bitwy Maurów i chrześcijan, podczas której ulice wypełniają przebierańcy, okrzyki i sceniczna walka kończąca się triumfem obrońców.

Sercem codziennego życia jest Plaça Major — główny plac z masywnym kościołem i kawiarnianymi stolikami rozstawionymi w cieniu. Usiądź tu z kawą i po prostu popatrz, jak toczy się miejscowe życie. W okolicy nie brakuje śladów artystów i muzyki: Pollença od dawna przyciągała malarzy zachwyconych tutejszym światłem, a w dawnym klasztorze Świętego Dominika od lat sześćdziesiątych odbywa się latem ceniony festiwal muzyczny. Warto też zajrzeć do rzymskiego mostu na obrzeżach — Pont Romà — kamiennej budowli, która przetrwała stulecia.

Praktycznie: z finca dojedziesz tu w jakieś dwadzieścia minut. Zaparkuj na obrzeżach starego miasta i dalej idź pieszo, bo wąskie uliczki nie są dla samochodów. Na Calvari załóż wygodne buty i weź wodę, zwłaszcza w upał — schody potrafią dać w kość. Najlepsza pora to poranek, gdy uliczki są jeszcze chłodne i puste, albo wczesny wieczór, gdy kamień nabiera ciepłej barwy. Sprawdź też, czy nie trafisz na dzień targowy — wtedy plac wypełniają stragany z lokalnymi produktami.

Pollença nie ma jednej wielkiej atrakcji, którą zaliczasz i jedziesz dalej. Jej urok jest rozproszony: w cyprysach na Calvari, w cieniu na Plaça Major, w ciszy rzymskiego mostu, w pamięci o nocy, gdy znosi się Chrystusa po schodach. To miasteczko, które trzeba przejść powoli, zatrzymując się co chwila — wtedy odda ci najwięcej.`},
     {n:"Mirador de Gorg Blau", r:4.6, d:"~35 min", note:"Turkusowe górskie jezioro i widokowa droga przez Serra de Tramuntana. Po drodze często kozy. Genialne na zdjęcia.", q:"Mirador de Gorg Blau Mallorca", pod:`Wjeżdżamy w samo serce gór. Droga wspina się serpentynami coraz wyżej, mija sosny i nagie skały, aż przed tobą otwiera się widok, który zatrzymuje w pół słowa: turkusowa tafla wody zamknięta między najwyższymi szczytami Majorki. To Gorg Blau — Błękitny Wąwóz.

Choć dziś podziwiasz tu wielkie jezioro, nie jest ono dziełem natury. To zbiornik retencyjny, zbudowany w latach siedemdziesiątych dwudziestego wieku, by gromadzić wodę z górskich opadów i zasilać wyspę spragnioną w długie, suche lata. Inżynierowie spiętrzyli wodę w naturalnej kotlinie wśród gór, a efekt okazał się piękniejszy, niż ktokolwiek planował: jezioro o barwie, która zmienia się od szmaragdu po głęboki granat, w zależności od światła i poziomu wody.

Wokół wznoszą się giganci. Tuż obok piętrzy się Puig Major — najwyższy szczyt Majorki, mierzący blisko tysiąc czterysta pięćdziesiąt metrów. Spójrz na jego wierzchołek, a dostrzeżesz białe kopuły: to wojskowa stacja radarowa, dlatego na sam szczyt wejść nie można. Ale to dodaje temu miejscu surowości — masz poczucie, że jesteś naprawdę wysoko, na dachu wyspy, daleko od plaż i hoteli.

Nazwa Gorg Blau jest stara, znacznie starsza niż zapora. W tej okolicy ludzie żyli już w epoce talajockiej, trzy tysiące lat temu — odnajdywano tu ślady pradawnych osad i kamienne monolity, świadectwa kultury, która zostawiła po sobie tylko głazy i zagadki. Pomyśl o tym, patrząc na wodę: zanim powstał zbiornik, tędy biegł dziki potok, a ludzie wędrowali tymi przełęczami od tysiącleci.

Mirador, czyli punkt widokowy, to idealne miejsce na krótki postój w trakcie górskiej trasy. Sama droga MA-dziesięć, biegnąca przez grzbiet Tramuntany, jest jedną z najpiękniejszych tras widokowych wyspy. Po drodze często spotkasz kozy wygrzewające się na asfalcie i sępy krążące wysoko nad graniami — Majorka jest domem dla potężnego sępa kasztanowatego, jednego z największych ptaków drapieżnych Europy. Niedaleko leży bliźniaczy zbiornik Cúber, od którego ruszają piesze szlaki.

Praktycznie: z finca to jakieś trzydzieści pięć minut krętą górską drogą — prowadź spokojnie i z wyczuciem, bo zakrętów nie brakuje, a w sezonie miniesz wielu rowerzystów mozolnie wspinających się pod górę. Zatrzymuj się tylko w wyznaczonych zatoczkach. Weź cieplejszą warstwę, bo na tej wysokości bywa chłodniej i wietrzniej niż na dole, oraz wodę i aparat. To świetny punkt, by połączyć go z wyprawą do klasztoru Lluc albo dalej, w dół, do zatoki Sa Calobra.

Gorg Blau to miejsce, gdzie spotykają się dzieło natury i dzieło człowieka — pradawne góry i nowoczesna zapora, dzikie kozy i wojskowe radary. Stań przy barierce, poczuj górski wiatr i pozwól sobie na chwilę ciszy. Z tej wysokości cała wakacyjna krzątanina wygląda na bardzo, bardzo małą.`},
     {n:"Parc Natural de s'Albufera", r:4.4, d:"~20 min", note:"Mokradła z flamingami, szerokie ścieżki i ukryte obserwatoria ptaków. Wstęp darmowy, rodzinnie. Woda, czapka, SPF.", q:"Parc Natural de s'Albufera Mallorca", pod:`Tuż za pasem nadmorskich hoteli, w miejscu, gdzie spodziewałbyś się kolejnej plaży, rozciąga się zupełnie inny świat: szuwary, kanały, trzcinowiska i ptaki, których głosy niosą się o świcie na kilometry. To Parc Natural de s'Albufera — największy obszar mokradeł na całych Balearach i jeden z najważniejszych rajów dla ptaków w basenie Morza Śródziemnego.

Sama nazwa zdradza głęboką przeszłość. S'Albufera pochodzi od arabskiego słowa al-buhayra, oznaczającego „małe morze" albo „lagunę" — bo dla dawnych mieszkańców te rozlewiska rzeczywiście były morzem w miniaturze. Przez wieki teren był jednak postrzegany jako problem: bagna, komary, malaria. Dlatego w dziewiętnastym wieku pojawił się ambitny plan, by go osuszyć. Za sprawę wzięła się brytyjska spółka, która sprowadziła inżynierów i wykopała sieć kanałów — z wielkim Gran Canal na czele — mających odprowadzić wodę i zamienić mokradła w pola uprawne. Sadzono tu ryż, łowiono węgorze, próbowano ujarzmić naturę. Ostatecznie człowiek odpuścił, a teren w tysiąc dziewięćset osiemdziesiątym ósmym roku objęto ochroną jako pierwszy park przyrodniczy na Balearach.

I dziś to triumf natury. Naliczono tu ponad trzysta gatunków ptaków — to liczba, która rozpala oczy każdego miłośnika przyrody. Brodzą tu czaple i czaple nadobne, przemykają zimorodki, w trzcinach kryją się rzadkie wodniczki i trzciniaki, a wiosną i jesienią park staje się przystankiem dla tysięcy ptaków wędrownych w drodze między Europą a Afryką. Przy odrobinie szczęścia zobaczysz nawet flamingi, brodzące w płytkiej wodzie na swoich patykowatych nogach. Po terenie poprowadzono ścieżki i drewniane czatownie — ukryte obserwatoria, z których można podglądać ptaki, nie płosząc ich.

To miejsce idealne dla rodziny z dzieckiem. Teren jest płaski, więc świetnie zwiedza się go pieszo albo na rowerze, a wypatrywanie kolejnych gatunków zamienia spacer w grę. Cisza, woda, szum trzcin i nagły łopot skrzydeł — to zupełnie inne oblicze Majorki niż zatłoczona plaża.

Praktycznie: wstęp do parku jest bezpłatny, choć przy wejściu zwykle trzeba odebrać darmową przepustkę w punkcie informacyjnym. Z finca dojedziesz tu w jakieś dwadzieścia minut, a z Can Picafort jeszcze bliżej — park leży właściwie między waszymi dwiema bazami. Przyjedź wcześnie rano albo pod wieczór, bo wtedy ptaki są najbardziej aktywne, a upał mniej dokucza. Zabierz wodę, czapkę, krem, a koniecznie repelent na komary — to wciąż mokradła. Lornetka zmienia tę wizytę w prawdziwą przygodę.

S'Albufera to dowód, że natura potrafi odzyskać to, co człowiek próbował jej odebrać. Tam, gdzie półtora wieku temu kopano kanały, by osuszyć ziemię, dziś brodzą flamingi i kryją się rzadkie ptaki. Wejdź na ścieżkę, zatrzymaj się w czatowni, ścisz głos i po prostu słuchaj. To jedno z tych miejsc, które nagradzają cierpliwych.`},
     {n:"Mediterranean Wildlife Foundation", r:4.8, d:"~8 min", note:"Sępy i orły z bliska — edukacyjne i robi wrażenie na dzieciach.", shut:"tylko wt i pt, 10–13", q:"Mediterranean Wildlife Foundation Campanet", pod:`Teraz coś dla tych, którzy chcą spojrzeć w oczy jednym z najbardziej majestatycznych mieszkańców wyspy — ptakom drapieżnym. Niedaleko Campanet działa ośrodek poświęcony dzikiej przyrodzie Majorki, w którym z bliska zobaczysz sępy, orły i inne skrzydlate drapieżniki, a przy okazji poznasz jedną z najpiękniejszych historii ochrony przyrody w Europie.

Bohaterem tej historii jest sęp kasztanowaty — po hiszpańsku voltor negre, czarny sęp. To gigant: jeden z największych ptaków latających Starego Kontynentu, o rozpiętości skrzydeł sięgającej blisko trzech metrów. Kiedy taki ptak przelatuje nad górami, jego cień sunie po zboczu jak cień małego samolotu. A jeszcze kilkadziesiąt lat temu te ptaki niemal zniknęły z Majorki. W latach osiemdziesiątych dwudziestego wieku na całej wyspie zostało ich zaledwie kilkanaście — truto je, niszczono gniazda, ginęły. Wydawało się, że to koniec.

I wtedy ludzie postanowili działać. Dzięki latom żmudnej ochrony, dokarmiania, pilnowania gniazd i edukacji populacja sępa kasztanowatego na Majorce odrodziła się i liczy dziś setki osobników. To jeden z najbardziej spektakularnych sukcesów w dziejach europejskiej ochrony przyrody — dowód, że gatunek stojący nad przepaścią można uratować, jeśli tylko zechce się to zrobić. Podobne wysiłki dotyczą innych drapieżników wyspy, jak rzadki orzeł czy odradzający się kania.

W ośrodku zobaczysz takie ptaki z niewielkiej odległości — często są to osobniki ranne lub osierocone, które trafiły tu pod opiekę, bo nie poradziłyby sobie na wolności. Opiekunowie opowiadają o ich zwyczajach, o łańcuchu pokarmowym, o tym, dlaczego sępy, choć budzą respekt, są dla przyrody bezcenne jako sprzątacze gór. Dla dzieci to lekcja, której nie zastąpi żaden podręcznik: widok ogromnego ptaka z bliska, jego spojrzenie, rozmiar szponów, potęga skrzydeł — to zostaje w pamięci.

Bardzo ważna uwaga praktyczna: to nie jest klasyczna atrakcja czynna codziennie od rana do wieczora. Ośrodek bywa otwarty tylko w wybrane dni — najczęściej we wtorki i piątki, zwykle w godzinach przedpołudniowych, mniej więcej od dziesiątej do trzynastej. Dlatego koniecznie zaplanuj wizytę z wyprzedzeniem i sprawdź aktualne godziny, żeby nie podjechać pod zamkniętą bramę. Z finca masz tu dosłownie kilka minut, więc łatwo to wpasować w poranek.

Weź wodę i czapkę, bo część pokazu odbywa się na zewnątrz, w słońcu. I nastaw dzieci, że to miejsce wymaga ciszy i spokoju — to nie zoo z atrakcjami, lecz ośrodek, w którym dzikie zwierzęta dochodzą do siebie.

Kiedy będziesz patrzył w oczy takiemu sępowi, pomyśl o tych kilkunastu ostatnich ptakach z lat osiemdziesiątych — i o tym, że dziś znów krążą nad górami Tramuntany dzięki uporowi garstki ludzi. To opowieść nie tylko o ptakach, ale o tym, że nie wszystko musi być stracone. Czasem wystarczy, że komuś naprawdę zależy.`}

   trips:[
     {n:"Sa Calobra + Torrent de Pareis", r:null, d:"~45 min", note:"Kultowa serpentynowa droga (pętla Nus de sa Corbata), jaskinia wchodząca w morze i kanion wodospadowy. Jedno z najbardziej spektakularnych miejsc wyspy. Połącz z Lluc w jedną trasę dzienną.", warn:"Jedź wcześnie rano — po 11:00 parking zatłoczony. Parking przyjmuje gotówkę.", q:"Torrent de Pareis Sa Calobra Mallorca", pod:`Czy słyszysz to? Ten cichy szum, który narasta z każdym zakrętem? To dźwięk jednej z najbardziej szalonych dróg, jakie człowiek odważył się zbudować. Jedziemy do Sa Calobra — maleńkiej zatoki u stóp gór Tramuntany, do której przez wieki dało się dotrzeć wyłącznie łodzią albo na grzbiecie muła.

Wszystko zmienił jeden człowiek: inżynier Antonio Parietti Coll. Na początku lat trzydziestych dwudziestego wieku dostał zadanie pozornie niewykonalne — zejść drogą z przełęczy Coll dels Reis, z wysokości ponad sześciuset metrów, w dół do samego morza, po zboczu tak stromym, że inni machali ręką: nie da się. Parietti spojrzał na górę inaczej. Zamiast walczyć z terenem, postanowił z nim zatańczyć. Zaprojektował zjazd tak, by droga sama się obniżała łagodnymi pętlami na przestrzeni kilkunastu kilometrów. A w jednym miejscu wykonał coś, co przeszło do legendy: zawiązał drogę w węzeł. Nus de sa Corbata — „węzeł krawata". Asfalt przechodzi pod własnym wiaduktem, zawracając o pełne trzysta sześćdziesiąt stopni. Drotę ukończono około tysiąc dziewięćset trzydziestego drugiego roku, i od razu stała się sławna. Dziś to jeden z najsłynniejszych odcinków dla kolarzy na świecie — zawodowcy pokonują tę wspinaczkę jako legendarny test nóg, a w sezonie miniesz ich dziesiątki, sunących pod górę w kolorowych koszulkach.

Ciekawostka, o której Parietti zapewne wiedział: ten sam człowiek zaprojektował również drogę na Cap de Formentor. Dwie najbardziej spektakularne szosy wyspy wyszły spod ręki jednego inżyniera, który traktował górę nie jak przeszkodę, ale jak materiał do rzeźbienia.

Ale Sa Calobra to nie tylko droga. Na dole czeka coś jeszcze bardziej niezwykłego. Z portu prowadzi krótki tunel wykuty w skale, a kiedy z niego wyjdziesz, staniesz u ujścia Torrent de Pareis. Sama nazwa znaczy „potok bliźniaków" — bo w głębi gór łączą się tu dwa strumienie, z Lluc i z Gorg Blau, by jako jeden przebić się do morza. Efektem są jedne z największych wąwozów całego basenu Morza Śródziemnego. Ściany wznoszą się na blisko dwieście metrów, a w najwęższym miejscu zbliżają się do siebie na zaledwie kilka metrów, tak że niebo zwęża się do wąskiej szczeliny. W dwa tysiące trzecim roku kanion uznano za pomnik przyrody. Wejdź w jego głąb, połóż dłoń na chłodnym kamieniu i posłuchaj ciszy — to miejsce ma w sobie coś z katedry, której nikt nie zbudował.

Raz w roku, na początku lipca, dzieje się tu rzecz osobliwa. W gardzieli kanionu, bez mikrofonów i głośników, od tysiąc dziewięćset sześćdziesiątego czwartego roku zbierają się chóry. Śpiewają a cappella, a skały oddają każdy dźwięk — naturalna akustyka, jakiej nie zaprojektuje żaden architekt. Ludzie siedzą na kamieniach i słuchają, jak głosy odbijają się od ścian pamiętających epokę, gdy człowiek jeszcze tu nie dotarł.

Słowo ostrzeżenia, jeśli kusi cię przejście całego wąwozu od góry, od Escorki w dół: to poważna, kilkugodzinna wyprawa ze wspinaczką po głazach, możliwa wyłącznie w suchej porze. Po deszczu kanion zamienia się w pułapkę — zdarzały się tu tragiczne w skutkach gwałtowne przybory wody. Z dziećmi trzymaj się dolnego odcinka od strony zatoki, krótkiego i bezpiecznego.

Praktyczna rada, którą zapamiętaj: bądź tu wcześnie. Naprawdę wcześnie. Po jedenastej autokary wypełniają parking, a magia ustępuje tłumowi. Przyjedź o poranku, gdy światło jest jeszcze miękkie, kanion pusty, a woda w zatoce ma kolor pomiędzy szmaragdem a turkusem. Zabierz gotówkę na parking, bo bywa z tym różnie, a obsługa nie zawsze przyjmuje karty.

Wracając w górę tą samą drogą, pomyśl o Parittim. O człowieku, który spojrzał na niemożliwe i powiedział: a jednak. Każdy z tych zakrętów to jego podpis. Sa Calobra to nie tylko cel — to droga, która sama w sobie jest opowieścią.`},
     {n:"Cap de Formentor", r:null, d:"~50 min", note:"Latarnia na klifach 200 m nad morzem — widok zapiera dech. Po drodze Playa de Formentor (piasek i sosny). Koniec drogi Majorki.", warn:"Latem (maj–paź) droga częściowo zamknięta dla aut. Sprawdź aktualnie: dojeżdżasz busem z plaży lub Barcares.", q:"Cap de Formentor lighthouse Mallorca", pod:`Jesteśmy na samym końcu świata. A przynajmniej na końcu Majorki. Przed nami Cap de Formentor — ostatni skrawek lądu, który wbija się w morze jak dziób okrętu, smagany wiatrem z dwóch stron naraz. Miejscowi mawiają, że to miejsce, gdzie spotykają się wiatry. I kiedy tu staniesz, uwierzysz w to bez wahania.

Droga, którą dojeżdżamy, to znów dzieło inżyniera Antonia Parittiego — tego samego, który zawiązał w węzeł szosę do Sa Calobry. Tutaj poprowadził asfalt wzdłuż krawędzi klifów, nad przepaściami spadającymi prosto do wody; ukończono ją w latach trzydziestych. Po drodze koniecznie zatrzymaj się przy punkcie widokowym Es Colomer — patrzysz stąd na samotną skałę sterczącą z morza jak strażnik i na zatoki tnące wybrzeże. Tuż obok, na wzgórzu, stoi Talaia d'Albercutx — kamienna wieża strażnicza z szesnastego wieku. Wznoszono takie wieże wzdłuż całego wybrzeża, by ostrzegać przed tym, co przez stulecia było prawdziwą zmorą wyspy: przed korsarzami z Afryki Północnej, którzy napadali, palili wsie i uprowadzali ludzi w niewolę. Z Albercutx, gdy dostrzeżono żagle piratów, zapalano ogień, a sygnał biegł od wieży do wieży aż w głąb lądu.

Na samym cyplu, na wysokości około dwustu dziesięciu metrów nad falami, stoi latarnia morska. Zbudował ją inżynier Emili Pou, a światło zapłonęło w tysiąc osiemset sześćdziesiątym trzecim roku. Pomyśl, czego to wymagało: każdy kamień, każdą belkę, a potem oliwę do lampy — bo pierwotnie latarnia świeciła płomieniem z oliwy z oliwek — trzeba było dostarczyć morzem i wciągnąć po stromiznie, zanim w ogóle powstała droga. Latarnik mieszkał tu samotnie przez długie tygodnie, odcięty od świata, mając za towarzystwo tylko wiatr i światło, które co noc wysyłał w ciemność.

Ale Formentor kryje też historię z zupełnie innej epoki. W tysiąc dziewięćset dwudziestym dziewiątym roku argentyński poeta i marzyciel Adan Diehl wybudował tu, wśród sosen nad ukrytą plażą, luksusowy Hotel Formentor. Był to akt szaleństwa — wielki, elegancki hotel na krańcu wyspy, do której ledwo dało się dojechać. A jednak zadziałało. Przez dekady ściągali tu najwięksi: Winston Churchill, który malował tutejsze pejzaże, gwiazdy kina jak Grace Kelly, arystokraci i dyplomaci. A w tysiąc dziewięćset sześćdziesiątym pierwszym roku hotel zapisał się w historii literatury: zorganizowano tu spotkania pisarzy i ustanowiono nagrodę Prix Formentor. Jej pierwszą edycję podzielili między siebie Jorge Luis Borges i Samuel Beckett — dwa nazwiska, które dziś znajdziesz w każdym podręczniku. Mówiono, że na tarasie tego hotelu rodziły się idee, o których świat dowiadywał się dopiero po latach.

Kiedy będziesz tu stał, na wietrznym cyplu, spójrz wstecz na wyspę. Zobaczysz całą Serra de Tramuntana ciągnącą się ku horyzontowi, błękit zatoki Pollença i bezkres otwartego morza. Plaża Formentor, ukryta poniżej wśród sosen, uchodzi za jedną z najpiękniejszych na wyspie — drobny piasek i woda w odcieniach, których nie da się nazwać.

Jedna ważna uwaga praktyczna: latem, mniej więcej od maja do października, droga na sam cypel bywa zamknięta dla prywatnych aut — wprowadzono to po latach, gdy korki na wąskiej szosie zamieniały wyprawę w mękę. Sprawdź aktualne zasady przed wyjazdem; może się okazać, że ostatni odcinek pokonasz autobusem wahadłowym z plaży albo z Port de Pollença. Nie psuje to przygody — przeciwnie, jedziesz wtedy bez stresu o parking, patrząc tylko w okno.

Przyjedź wcześnie rano albo pod wieczór, w złotej godzinie, gdy klify płoną pomarańczem, a tłumy znikają. Wtedy Formentor pokazuje swoją prawdziwą twarz — dziką, samotną i piękną. Stoisz na końcu Majorki, a przed tobą już tylko wiatr, woda i horyzont.`},
     {n:"Sóller + Port de Sóller", r:4.3, d:"~55 min", note:"Miasteczko wśród drzew pomarańczowych z klimatycznym tramwajem do portu. Targ, bary, pływanie. Z dziećmi idealne — tram to atrakcja sama w sobie.", q:"Soller old town Mallorca", pod:`Za chwilę wjedziemy do doliny, którą miejscowi przez wieki nazywali doliną złota. Nie chodziło o kruszec, lecz o coś, co pachniało słodko i rosło na drzewach — o pomarańcze i cytryny. Witaj w Sóller.

Sóller leży w kotlinie otoczonej z każdej strony górami Tramuntany. Przez stulecia te góry były jednocześnie błogosławieństwem i przekleństwem. Tworzyły idealny mikroklimat dla cytrusów — ale odcinały dolinę od reszty wyspy. Droga do Palmy wiodła przez przełęcz Coll de Sóller, liczącą podobno około pięćdziesięciu siedmiu zakrętów; podróż trwała większą część dnia. Dlatego mieszkańcy spoglądali nie w głąb lądu, lecz ku morzu. Ładowali pomarańcze na statki i wysyłali je do Francji, głównie do Marsylii.

I tu zaczyna się najciekawsze. Handel z Francją uczynił Sóller bogatym i — co rzadkie na wyspie — światowym. Wielu mieszkańców wyemigrowało do Francji, dorobiło się i wróciło z pieniędzmi, ideami oraz nowym smakiem. Rozejrzyj się po głównym placu wokół wielkiego kościoła Sant Bartomeu. Jego falującą, kamienną fasadę przeprojektował na początku dwudziestego wieku Joan Rubió i Bellver — uczeń i współpracownik samego Antoniego Gaudiego. Obok stoi dawny bank o równie secesyjnej fasadzie, a nieopodal kamienica Can Prunera, dziś muzeum sztuki modernistycznej. Dolina zagubiona w górach nagle wyglądała jak fragment Barcelony.

Za pieniądze z pomarańczy mieszkańcy rozwiązali wreszcie problem odcięcia. W tysiąc dziewięćset dwunastym roku otworzyli kolej — wąskotorowy pociąg, który przebija się przez serce gór trzynastoma tunelami kutymi w skale, w tym jednym długim na blisko trzy kilometry. Te same drewniane wagony, wypolerowane mosiądze i skórzane siedzenia jeżdżą do dziś, a trasa do Palmy liczy około dwudziestu siedmiu kilometrów. Rok później, w tysiąc dziewięćset trzynastym, uruchomiono tramwaj łączący miasteczko z portem. Wsiądź, jeśli masz czas — to podróż w przeszłość. Zabytkowy tramwaj kołysze się przez gaje pomarańczowe i wąskie uliczki, dzwoniąc jak sto lat temu, a dla dzieci sama jazda bywa większą atrakcją niż niejedna plaża.

A teraz historia, której nie znajdziesz na pocztówkach. W tysiąc pięćset sześćdziesiątym pierwszym roku na Sóller spadła flota berberyjskich korsarzy — setki uzbrojonych napastników wylądowały, by złupić dolinę. Mieszkańcy stawili opór i odparli atak, a w pamięci wyspy zapisał się zwłaszcza pewien epizod: dwie kobiety z domu Can Tamany, tak zwane Valentes Dones, „dzielne niewiasty", miały własnoręcznie rozprawić się z grupą napastników. Do dziś co roku w maju Sóller odgrywa tę bitwę podczas hucznego święta Es Firó — mieszkańcy przebierają się za Maurów i chrześcijan, a uliczki wypełnia inscenizacja walki, dym i okrzyki. To jedno z najbarwniejszych świąt na całej wyspie.

Port de Sóller to z kolei niemal idealnie okrągła zatoka, osłonięta przed wiatrem ramionami lądu. Kiedyś chroniła rybaków i kupieckie statki, dziś kusi spacerem po promenadzie, kawą z widokiem na łodzie i kąpielą w spokojnej wodzie.

Ciekawostka, o której mało kto pamięta: bezpośredni tunel drogowy łączący Sóller z resztą wyspy otwarto dopiero w tysiąc dziewięćset dziewięćdziesiątym siódmym roku. Przez prawie cały dwudziesty wiek najszybszą drogą do świata był ten pomarańczowy pociąg. Pomyśl o tym, jadąc — przez dziesięciolecia stalowe szyny znaczyły dla tej doliny więcej niż jakakolwiek szosa.

Sóller uczy cierpliwości. Nie spiesz się. Usiądź na placu, zamów świeżo wyciskany sok z tutejszych pomarańczy i popatrz, jak życie toczy się tak, jak toczyło od pokoleń — w cieniu gór, w zapachu cytrusów, w rytmie dzwonka tramwaju.`},
     {n:"Santuari de Lluc", r:4.4, d:"~25 min", note:"Serce Serra de Tramuntana — klasztor, fontanny, hike na skały. Dobry punkt startowy na Sa Calobra tego samego dnia. Wejście darmowe.", q:"Santuari de Lluc Mallorca", pod:`Jedziemy w serce gór. Tam, gdzie kończą się wioski, a zaczyna cisza, na wysokości ponad pięciuset metrów leży najświętsze miejsce na całej Majorce — Santuari de Lluc. Klasztor, do którego od ośmiu wieków pielgrzymują wyspiarze. Ale zanim wejdziemy, opowiem ci, jak to się zaczęło. Bo zaczęło się od chłopca i od tajemnicy.

Legenda mówi, że było to w trzynastym wieku, niedługo po tym, jak wojska Jakuba Pierwszego Zdobywcy odbiły wyspę z rąk muzułmanów. Pewien młody pasterz — w przekazach maurski chłopiec, świeżo ochrzczony, imieniem Lluc — wypasał owce wśród tych skał. Pewnego dnia dostrzegł wśród kamieni małą, ciemną figurkę Matki Boskiej. Zaniósł ją do kościoła, lecz nazajutrz figura w niewytłumaczalny sposób wróciła w to samo miejsce w górach. I znów. I jeszcze raz. Ludzie odczytali to jako znak: Madonna chce zostać tutaj. I tak, na tym odludnym zboczu, narodziło się sanktuarium, którym od stuleci opiekują się misjonarze Najświętszych Serc.

Figurkę — niewielką, o ściemniałym z wiekiem obliczu — nazwano czule La Moreneta, „Śniada". Jest patronką całej Majorki, a do dziś dziesiątki tysięcy ludzi rocznie pokonują górską drogę, by stanąć przed nią choć na chwilę. Najsłynniejsza z tych pielgrzymek to nocny marsz „Des Güell a Lluc a peu" — od tysiąc dziewięćset siedemdziesiątego czwartego roku, każdego sierpnia, tysiące osób wychodzi nocą z przedmieść Palmy i idzie pieszo blisko pięćdziesiąt kilometrów, by o świcie dotrzeć tutaj. To jedno z największych zbiorowych przeżyć wyspy.

Jest jeszcze jeden dźwięk, dla którego warto przyjechać. To głosy chłopięcego chóru — Els Blauets, „Błękitni", nazwani od koloru swoich sutann. Chór założono w tysiąc pięćset trzydziestym pierwszym roku, co czyni go jednym z najstarszych w Europie. Gdy mali chórzyści zaczynają śpiewać w bazylice, zwykle przed południem i ponownie wieczorem, dźwięk unosi się pod sklepieniem i wypełnia kamienne wnętrze tak, że ciarki przechodzą po plecach. Jeśli traficie na godzinę występu, zatrzymaj się i posłuchaj.

Zwróć też uwagę na detal, który łączy Lluc z największym architektem Katalonii. Na początku dwudziestego wieku Antoni Gaudí pracował przy renowacji katedry w Palmie i przy tej okazji jego krąg odcisnął ślad również tutaj: wzdłuż drogi krzyżowej i ścieżki różańcowej wiodącej na wzgórze ustawiono kamienne monumenty zaprojektowane w duchu jego szkoły. Wejdź na ten szlak — z każdym stopniem rozszerza się widok na góry ze wszystkich stron.

Wokół klasztoru rozciągają się ogrody, ogród botaniczny z roślinami Tramuntany, muzeum i szlaki w głąb gór. Lluc to nie jest miejsce, przez które się przejeżdża. To miejsce, w którym się oddycha. Usiądź na murku, posłuchaj wiatru w sosnach i poczuj, dlaczego przez osiemset lat ludzie wspinali się tu, by znaleźć spokój.

Praktycznie: wejście do klasztoru i na teren jest bezpłatne, a samo miejsce świetnie nadaje się jako punkt wypadowy — stąd masz już naprawdę blisko do Sa Calobry, więc da się połączyć jedno z drugim w jeden mocny dzień w górach. Można tu nawet przenocować w dawnych celach.

Kiedy będziesz odjeżdżał, obejrzyj się jeszcze raz. Mały pasterz, ciemna figurka, ośmiowieczna pieśń chłopców pod kamiennym sklepieniem. Czasem największe historie zaczynają się od najdrobniejszych rzeczy — od czegoś, co ktoś dostrzegł wśród kamieni i nie potrafił o tym zapomnieć.`},
     {n:"Valle de Bóquer", r:4.7, d:"~25 min", gem:true, note:"Dolina wśród skał prowadząca do dzikiej plaży — łatwy spacer z dziećmi, kozy na szlaku, sępy krążące nad głową. Parking darmowy w Port de Pollença.", q:"Valle de Boquer Pollenca Mallorca", pod:`Teraz zabiorę cię w miejsce, które omijają autokary, a które ornitolodzy z całej Europy wymieniają niemal szeptem, jak skarb. Valle de Bóquer — Dolina Bóquer. Leży tuż za Port de Pollença, a mimo to większość turystów przejeżdża obok, nie wiedząc, co traci.

Wejście do doliny prowadzi przez bramę starej, ufortyfikowanej posiadłości — possessió Bóquer, której początki sięgają trzynastego wieku, czasów tuż po chrześcijańskim podboju wyspy. Grube kamienne mury budowano tu nie dla ozdoby, lecz dla przetrwania — w epoce, gdy wybrzeże nękali korsarze. Mijasz bramę i nagle świat się zmienia. Z dwóch stron wznoszą się surowe grzbiety: po jednej stronie ciągnie się Serra del Cavall Bernat, postrzępiona grań przypominająca grzbiet smoka, której skalne iglice rysują się ostro na tle nieba. Między nimi biegnie kamienista ścieżka, a ty wchodzisz w dolinę, która wygląda, jakby czas się tu zatrzymał.

To miejsce ma dwie dusze. Pierwsza należy do ptaków. Dolina Bóquer leży na trasie wędrówek tysięcy ptaków przelatujących między Europą a Afryką, dlatego to jeden z najsłynniejszych punktów obserwacji w całym basenie Morza Śródziemnego. Z cierpliwością i odrobiną szczęścia zobaczysz tu modrego nadskalnika o stalowym upierzeniu, drapieżne sokoły — w tym rzadkiego sokoła Eleonory, który gniazduje na okolicznych klifach — orła południowego krążącego wysoko, a wiosną i jesienią całe stada drobnych ptaków śpiewających, zatrzymujących się tu w drodze. Zabierz lornetkę, jeśli masz; zamienia spacer w polowanie, tyle że na obrazy. Nie przypadkiem okolice Pollençy od dawna przyciągały też artystów — w pobliskim Port de Pollença osiadł na przykład wybitny malarz Hermen Anglada-Camarasa, oczarowany tutejszym światłem.

Druga dusza doliny to kozy. Półdzikie, zuchwałe, władające tym terenem od pokoleń. Strzeż jedzenia — potrafią podejść bezceremonialnie i poczęstować się twoją kanapką, patrząc ci prosto w oczy. Dzieci je uwielbiają.

Ścieżka jest łagodna i nadaje się nawet dla młodszych nóg. Po jakiejś godzinie marszu dolina otwiera się na morze, a ty docierasz do Cala Bóquer — dzikiej, kamienistej zatoczki, do której nie prowadzi żadna droga. Nie ma tu barów, leżaków ani parasoli. Jest tylko woda, kamienie, cisza i poczucie, że odkryłeś miejsce wyłącznie dla siebie. Woda bywa chłodna, ale krystaliczna; weź buty do wody, bo dno jest kamieniste.

Kilka praktycznych słów: parking przy wejściu jest darmowy, ale niewielki, więc przyjedź rano. Załóż wygodne buty, weź wodę i czapkę, bo na ścieżce prawie nie ma cienia, a w południe potrafi mocno przygrzać. Idź wolno, zatrzymuj się, nasłuchuj — Bóquer nagradza cierpliwych.

Mówi się, że na Majorce wszystko już odkryto i opisano. A potem wchodzisz w Dolinę Bóquer, słyszysz tylko wiatr, krzyk sokoła gdzieś wysoko i stukot kozich kopyt na kamieniach — i rozumiesz, że wyspa wciąż ma swoje sekretne zakątki. Trzeba tylko zostawić auto i pójść kawałek dalej, niż idą inni.`},
     {n:"Puig de Maria (Santuari)", r:4.6, d:"~20 min", gem:true, note:"30-min wejście pieszo na wzgórze 317 m, panorama 360° nad Pollençą i zatoką. Barak kawowy na szczycie. Darmowe, i prawie nikt tu nie idzie.", q:"Mare de Déu del Puig Pollença Mallorca", pod:`Spójrz na wzgórze górujące nad Pollençą. Na samym szczycie, ponad trzysta metrów nad miastem, widać kamienne mury — to Puig de Maria, jedno z tych miejsc, które większość turystów ogląda tylko z dołu, nie wiedząc, jaka historia kryje się na górze.

Sanktuarium ma ponad sześćset lat, a powód jego powstania jest poruszający. W połowie czternastego wieku przez całą Europę przetoczyła się czarna śmierć — dżuma, która w ciągu kilku lat zmiotła ogromną część ludności kontynentu. Ludzie, przerażeni i bezradni wobec zarazy, której nie rozumieli, szukali ratunku tam, gdzie tylko mogli. Wierzono, że wysoko w górach, z dala od skażonego powietrza nizin, można znaleźć schronienie i łaskę. Tak właśnie na tym szczycie powstała najpierw kaplica, a pod koniec stulecia osiadły tu zakonnice, które przez kolejne wieki żyły w odosobnieniu na swoim kamiennym tronie. Z czasem miejscem opiekowali się także pustelnicy. Budowla ma charakter na wpół obronny — gruby mur i przysadzista wieża miały chronić nie tylko przed wiatrem, ale i przed napastnikami, bo z tej wysokości widać było każdego, kto zbliżał się od strony morza.

Żeby tam dotrzeć, trzeba zostawić auto u podnóża i wejść pieszo. Spacer zajmuje jakieś dwadzieścia, trzydzieści minut. Z początku idzie się asfaltową drogą, potem nierównym, brukowanym szlakiem, który pod koniec robi się stromy — wtedy nogi przypominają, że to jednak wspinaczka. Ale każdy krok jest tego wart.

Na górze czeka nagroda, jakiej nie spodziewałbyś się po tak skromnym miejscu. Panorama trzysta sześćdziesiąt stopni: poniżej miasteczko Pollença z gęstwiną dachów i słynnymi schodami Calvari, dalej dwie wielkie zatoki — Pollença i Alcúdia — a na horyzoncie góry Tramuntany i błękit otwartego morza. Przy dobrej widoczności obejmujesz wzrokiem prawie cały północny kraniec wyspy naraz. Wieje tu wiatr, słychać tylko jego szum i czasem dzwon.

A teraz coś, o czym mało kto wie: w dawnych celach zakonnic można dziś przenocować. Warunki są surowe i proste — kamienne ściany, wąskie łóżko, żadnych luksusów, prosty posiłek w refektarzu — ale wyobraź sobie, że budzisz się o świcie na szczycie góry, wychodzisz przed klasztor i widzisz, jak słońce wstaje nad zatoką, a całe miasto wciąż śpi w dole. Mało które przeżycie na wyspie z tym konkuruje. Na górze działa też skromny bar, gdzie odsapniesz przy kawie, zanim ruszysz w dół.

Praktycznie: załóż wygodne buty i weź wodę, zwłaszcza w upalny dzień, bo cienia po drodze niewiele. Punkt startowy znajdziesz tuż przy obwodnicy Pollençy; parking u podnóża bywa ciasny, więc lepiej rano.

Puig de Maria to dowód, że na Majorce najlepsze widoki rzadko przychodzą za darmo — trzeba po nie trochę podejść. Ale gdy staniesz na górze, z wiatrem we włosach i całą północą wyspy u stóp, zrozumiesz, dlaczego ludzie wspinali się tu od sześciu wieków: w czasach zarazy po nadzieję, a dziś po coś, czego w dolinie coraz trudniej znaleźć — po ciszę.`},
     {n:"Ermita de Betlem", r:4.5, d:"~50 min", gem:true, note:"Odległy klasztor na klifach nad morzem — 8 km wąską drogą przez las. Absolutna cisza, kaplica jak wyjęta z innej epoki. Jedno z najbardziej tajemniczych miejsc wyspy.", q:"Ermita de Betlem Artà Mallorca", pod:`To będzie wyprawa dla tych, którzy szukają ciszy. Prawdziwej ciszy. Jedziemy do Ermita de Betlem — pustelni ukrytej wysoko w górach półwyspu Artà, w paśmie Serra de Llevant, jednym z najbardziej odludnych i tajemniczych zakątków całej Majorki.

Już sama droga jest częścią przygody. Z miasteczka Artà wspina się wąska, kręta szosa — około ośmiu kilometrów serpentyn wśród skał i karłowatego lasu. Mijasz po drodze widoki, od których zapiera dech, a im wyżej, tym ciszej i pusto. W pewnym momencie cywilizacja zostaje gdzieś daleko w dole, a ty masz wrażenie, że wjeżdżasz do innego świata.

Pustelnię założono w tysiąc osiemset piątym roku — grupa pustelników, duchowych spadkobierców tradycji świętych Pawła i Antoniego, szukała miejsca jak najdalej od zgiełku. I trudno o lepszy wybór. Zakonnicy żyli tu w skrajnej prostocie: uprawiali maleńkie tarasowe poletka wydarte górze, hodowali kilka zwierząt, czerpali wodę ze źródła zwanego Font de s'Ermita, modlili się i milczeli. Ich świat kończył się na tych murach i na widoku rozciągającym się aż po zatokę Alcúdii.

Nazwa Betlem — Betlejem — nie jest przypadkowa. W kaplicy kryje się jej serce: scena narodzenia umieszczona w czymś na kształt groty, jakby fragment betlejemskiej jaskini przeniesiony tu, w góry Artà. Wejdź do środka, gdy nikogo nie ma. Półmrok, chłód kamienia, zapach świec. Usiądź na ławce i posłuchaj. Usłyszysz tylko własny oddech i czasem wiatr ocierający się o mury. Pielgrzymi, którzy tu docierają, mówią często to samo: że poczuli się bliżej czegoś, czego nie potrafią nazwać.

Warto wiedzieć, że pustelnia jest też bramą do dzikich zakątków wybrzeża. Z okolicy prowadzą szlaki w stronę ukrytych plaż półwyspu — jak kamienista Platja des Verger czy zatoczka Es Caló — do których nie dotrzesz autem, tylko pieszo, przez las i skały. To jeden z ostatnich naprawdę nietkniętych fragmentów wyspy, częściowo objęty ochroną jako teren przyrodniczy.

Wokół samej pustelni jest skromnie i — przyznajmy szczerze — miejscami zaniedbane. Część terenu bywa zamknięta, fontanna ze statuą Marii nie zawsze w najlepszym stanie. Ale właśnie ta surowość, ten brak turystycznego wygładzenia, sprawiają, że Betlem jest prawdziwe. To nie atrakcja przygotowana pod bilety. To miejsce, które żyje własnym, powolnym rytmem od ponad dwustu lat.

Praktycznie: droga jest wąska i wymaga ostrożnej jazdy, zwłaszcza gdy z naprzeciwka nadjeżdża inne auto — bywa, że ktoś musi się cofnąć do mijanki, więc jedź spokojnie i bez pośpiechu. Pustelnia bywa otwarta w ciągu dnia, ale warto sprawdzić godziny, bo potrafią być kapryśne. Zabierz wodę i wygodne buty, jeśli chcesz przejść się okolicznymi ścieżkami — widoki wynagrodzą trud.

Kiedy będziesz wracał tą krętą drogą w dół, zatrzymaj się na chwilę przy jednym z zakrętów i obejrzyj za siebie. Mały biały budynek przyklejony do góry, otoczony bezkresem skał i nieba. Pomyśl o ludziach, którzy wybrali to miejsce na całe życie — z dala od wszystkiego, blisko jedynie ciszy. W świecie, który nigdy nie milczy, Ermita de Betlem oferuje rzecz dziś bezcenną: spokój, którego nie da się kupić.`},
     {n:"Ses Païsses (Artà)", r:4.2, d:"~40 min", note:"Talajotyczne ruiny z epoki brązu (3000 lat), €4 bilet, cień drzew. Wnikliwa dla dzieci — forteca z cyklopowych głazów. Niedziela: zamknięte.", shut:"niedz zamknięte", q:"Ses Païsses Artà Mallorca", pod:`Stoimy przed murem, który zbudowano około trzech tysięcy lat temu. Trzy tysiące. Zanim powstał Rzym, zanim narodziła się większość tego, co znamy z podręczników, ktoś tutaj, na tej wyspie, układał te potężne głazy jeden na drugim. Witaj w Ses Païsses — jednym z najlepiej zachowanych świadectw tajemniczej kultury talajockiej.

Tuż pod miasteczkiem Artà, w cieniu starego dębowego lasu, kryje się osada otoczona murem z kamieni tak wielkich, że trudno uwierzyć, by poruszyli je ludzie bez maszyn. Takie konstrukcje nazywa się cyklopowymi — bo dawni Grecy, widząc podobne mury, byli przekonani, że wznieść je mogli tylko jednoocy olbrzymi, cyklopi. Przejdź przez wejście — monumentalny portal z trzech ogromnych, monolitycznych płyt, jednych z najpotężniejszych tego typu na całych Balearach — i znajdziesz się w sercu osady sprzed epoki.

Kim byli ci ludzie? Tu zaczyna się zagadka. Kultura talajocka rozkwitła na Majorce i Minorce w epoce brązu, mniej więcej od trzynastego wieku przed naszą erą, a nazwę bierze od charakterystycznych kamiennych wież — talajotów — których przeznaczenia do dziś nie jesteśmy pewni. Były wieżami obronnymi? Punktami obserwacyjnymi? Miejscami zgromadzeń, kultu, a może grobowcami wodzów? Archeolodzy spierają się od dziesięcioleci. W centrum Ses Païsses stoi właśnie taki talajot, a wokół niego resztki domostw i pomieszczeń, w których toczyło się codzienne życie: mielono zboże, przechowywano zapasy, chroniono się przed wrogiem. Systematyczne badania prowadził tu od końca lat pięćdziesiątych dwudziestego wieku włoski archeolog Giovanni Lilliu, jeden z największych znawców prehistorii śródziemnomorskiej.

A teraz ciekawostka, która zmienia spojrzenie na tę wyspę. Mieszkańcy talajockich Balearów słynęli w całym antycznym świecie z jednej umiejętności: byli mistrzami procy. Wyspiarscy procarze, zwani foners, potrafili z zabójczą celnością miotać kamienne i ołowiane pociski na ogromne odległości. Mówiono, że ćwiczyli od dzieciństwa — że matka kładła chłopcu jedzenie na gałęzi i pozwalała zjeść dopiero, gdy zdołał je strącić procą. Te umiejętności były tak cenione, że Kartagińczycy, a potem Rzymianie, najmowali balearskich procarzy jako elitarnych żołnierzy; walczyli między innymi w wojnach punickich. Według jednej z teorii sama nazwa „Baleary" wywodzi się od greckiego słowa oznaczającego „miotać", „rzucać" — a więc od procy. Stojąc tu, w tej osadzie, patrzysz na ojczyznę wojowników, których bały się antyczne armie.

Najbardziej porusza jednak nie to, co wiemy, lecz to, czego nie wiemy. Ci ludzie nie zostawili pisma. Nie znamy ich języka, imion bogów, opowieści przekazywanych wieczorami przy ogniu. Zostały tylko kamienie — milczące, masywne, trwające. Połóż dłoń na murze i pomyśl: tę samą powierzchnię dotykała kiedyś ręka kogoś, kto żył trzy tysiące lat temu i patrzył na te same gwiazdy co ty. Z czasem osadę opuszczono. Dlaczego? Czy przyszli najeźdźcy, czy zmienił się klimat, czy po prostu świat poszedł dalej? Nie wiemy. Ses Païsses trwa jako pytanie bez odpowiedzi — i może właśnie dlatego tak działa na wyobraźnię.

Praktycznie: bilet wstępu jest symboliczny, kilka euro, a po terenie prowadzą tablice tłumaczące, na co patrzysz. Jest sporo cienia, więc to dobra wyprawa nawet w upalny dzień. Pamiętaj tylko, że w niedzielę bywa zamknięte, a w soboty czynne tylko do południa — sprawdź godziny. Świetnie łączy się to ze zwiedzaniem samego Artà: starego miasta, fortecy-sanktuarium Sant Salvador na wzgórzu i pobliskich jaskiń.

Dla dzieci to jak wejście do prawdziwej fortecy z bajki — tyle że ta jest najprawdziwsza i starsza niż wszystko, co znają. A dla ciebie? To rzadka okazja, by dotknąć czegoś naprawdę pradawnego i poczuć, jak płytka bywa nasza pamięć i jak głęboka jest cisza kamieni.`}
   ]},
