   poi:[
     {n:"Platja de Muro", r:4.7, d:"obok", note:"Długa, płytka i piaszczysta plaża — idealna dla dziecka. Spokojniejsza niż centrum, woda wchodzi łagodnie.", q:"Platja de Muro Mallorca", pod:`Czasem najpiękniejsza atrakcja to po prostu plaża — pod warunkiem, że to właściwa plaża. A Platja de Muro, leżąca tuż obok waszego hotelu w Can Picafort, należy do najlepszych na całej wyspie, zwłaszcza gdy podróżujesz z dzieckiem.

Wyobraź sobie wstęgę drobnego, jasnego piasku ciągnącą się kilometrami wzdłuż wielkiej zatoki Alcúdii. Woda wchodzi tu łagodnie i bardzo długo pozostaje płytka — możesz odejść spory kawałek od brzegu, a sięga ledwie do pasa. Dla małych dzieci to idealne, bezpieczne kąpielisko: ciepła, spokojna woda, bez gwałtownych spadków dna. Piasek jest miękki, kolor wody przechodzi od jasnego turkusu po głęboki błękit, a całość wygląda niemal jak z folderu, tyle że naprawdę.

To, co wyróżnia Platja de Muro, kryje się jednak za plecami plażowiczów. Tę plażę osłania pas wydm i nadmorskiego lasu sosnowego — fragment chronionego obszaru zwanego Es Comú de Muro. To naturalna bariera, która nie tylko daje cień, ale i łączy plażę z czymś znacznie większym: tuż za wydmami zaczyna się mokradło s'Albufera, największy park przyrody na Balearach. Innymi słowy, leżysz na plaży, a kilkaset metrów dalej brodzą czaple i kryją się rzadkie ptaki. Ta bliskość dzikiej przyrody sprawia, że Platja de Muro ma w sobie coś, czego brakuje zatłoczonym, zabudowanym plażom: oddech, przestrzeń, kawałek nietkniętej natury w zasięgu spaceru.

Wzdłuż brzegu rozsiane są chiringuitos — plażowe bary, w których napijesz się czegoś zimnego albo zjesz prosto stopami w piasku. Niektóre z nich, jak słynne miejsca na fideuà i paellę, należą do najlepszych w okolicy. Można więc spędzić tu cały dzień: rano kąpiel i zamki z piasku, w południe lunch w cieniu, po południu drzemka pod parasolem, a wieczorem spacer brzegiem, gdy słońce kładzie się na wodzie.

Praktycznie: plaża jest na wyciągnięcie ręki z hotelu, więc to idealne miejsce na „leniwy dzień" między bardziej aktywnymi wyprawami. Leżaki i parasole bywają płatne, ale zawsze możesz rozłożyć własny ręcznik na piasku. Zabierz dużo wody, krem z wysokim filtrem i coś do ochrony przed słońcem dla dziecka, bo cienia na otwartym piasku nie ma — szukaj go w pasie sosen na tyłach. Rano łatwiej o spokojniejsze, mniej zatłoczone miejsce. A jeśli wieje od strony lądu, woda bywa wyjątkowo gładka i ciepła.

Platja de Muro to przypomnienie, że nie wszystko musi być wyprawą i historią. Czasem największą atrakcją jest po prostu długa, płytka, ciepła woda, w której dziecko może się bawić godzinami, podczas gdy ty leżysz na piasku, słuchasz fal i wiesz, że tuż za plecami, za pasem wydm, kryje się dziki świat ptaków. To plaża, która łączy wygodę z naturą — i właśnie dlatego się ją pokochuje.`},
     {n:"Parc Natural de s'Albufera", r:4.4, d:"~10 min", note:"Flamingi i ptaki, ścieżki rowerowe i spacerowe. Z hotelu naprawdę blisko — dobry poranek.", q:"Parc Natural de s'Albufera Mallorca", pod:`Tuż za pasem nadmorskich hoteli, w miejscu, gdzie spodziewałbyś się kolejnej plaży, rozciąga się zupełnie inny świat: szuwary, kanały, trzcinowiska i ptaki, których głosy niosą się o świcie na kilometry. To Parc Natural de s'Albufera — największy obszar mokradeł na całych Balearach i jeden z najważniejszych rajów dla ptaków w basenie Morza Śródziemnego.

Sama nazwa zdradza głęboką przeszłość. S'Albufera pochodzi od arabskiego słowa al-buhayra, oznaczającego „małe morze" albo „lagunę" — bo dla dawnych mieszkańców te rozlewiska rzeczywiście były morzem w miniaturze. Przez wieki teren był jednak postrzegany jako problem: bagna, komary, malaria. Dlatego w dziewiętnastym wieku pojawił się ambitny plan, by go osuszyć. Za sprawę wzięła się brytyjska spółka, która sprowadziła inżynierów i wykopała sieć kanałów — z wielkim Gran Canal na czele — mających odprowadzić wodę i zamienić mokradła w pola uprawne. Sadzono tu ryż, łowiono węgorze, próbowano ujarzmić naturę. Ostatecznie człowiek odpuścił, a teren w tysiąc dziewięćset osiemdziesiątym ósmym roku objęto ochroną jako pierwszy park przyrodniczy na Balearach.

I dziś to triumf natury. Naliczono tu ponad trzysta gatunków ptaków — to liczba, która rozpala oczy każdego miłośnika przyrody. Brodzą tu czaple i czaple nadobne, przemykają zimorodki, w trzcinach kryją się rzadkie wodniczki i trzciniaki, a wiosną i jesienią park staje się przystankiem dla tysięcy ptaków wędrownych w drodze między Europą a Afryką. Przy odrobinie szczęścia zobaczysz nawet flamingi, brodzące w płytkiej wodzie na swoich patykowatych nogach. Po terenie poprowadzono ścieżki i drewniane czatownie — ukryte obserwatoria, z których można podglądać ptaki, nie płosząc ich.

To miejsce idealne dla rodziny z dzieckiem. Teren jest płaski, więc świetnie zwiedza się go pieszo albo na rowerze, a wypatrywanie kolejnych gatunków zamienia spacer w grę. Cisza, woda, szum trzcin i nagły łopot skrzydeł — to zupełnie inne oblicze Majorki niż zatłoczona plaża.

Praktycznie: wstęp do parku jest bezpłatny, choć przy wejściu zwykle trzeba odebrać darmową przepustkę w punkcie informacyjnym. Z finca dojedziesz tu w jakieś dwadzieścia minut, a z Can Picafort jeszcze bliżej — park leży właściwie między waszymi dwiema bazami. Przyjedź wcześnie rano albo pod wieczór, bo wtedy ptaki są najbardziej aktywne, a upał mniej dokucza. Zabierz wodę, czapkę, krem, a koniecznie repelent na komary — to wciąż mokradła. Lornetka zmienia tę wizytę w prawdziwą przygodę.

S'Albufera to dowód, że natura potrafi odzyskać to, co człowiek próbował jej odebrać. Tam, gdzie półtora wieku temu kopano kanały, by osuszyć ziemię, dziś brodzą flamingi i kryją się rzadkie ptaki. Wejdź na ścieżkę, zatrzymaj się w czatowni, ścisz głos i po prostu słuchaj. To jedno z tych miejsc, które nagradzają cierpliwych.`},
     {n:"Alcúdia + Ruiny Pollentia", r:4.2, d:"~15 min", note:"Starówka w średniowiecznych murach + rzymskie ruiny i amfiteatr (bilet ~4 € z muzeum). Klimatyczny rynek i tapas.", q:"Ruïnes de Pollentia Alcúdia", pod:`Pętla murów, brama z wieżami, a za nią uliczki tak wąskie, że dotkniesz obu ścian naraz — to Alcúdia, jedno z najlepiej zachowanych średniowiecznych miasteczek Majorki. Ale prawdziwa historia tego miejsca jest znacznie, znacznie starsza. Bo zanim powstała chrześcijańska Alcúdia, stało tu rzymskie miasto, które było stolicą całej wyspy.

Cofnijmy się do roku sto dwudziestego trzeciego przed naszą erą. Rzym, panujący już nad częścią Morza Śródziemnego, postanowił podporządkować sobie Baleary. Powód był prozaiczny i fascynujący zarazem: wyspiarze słynęli jako najlepsi procarze świata, a ich umiejętności budziły grozę — woleli mieć ich po swojej stronie niż przeciwko sobie. Konsul Kwintus Cecyliusz Metellus podbił wyspę i założył tu miasto Pollentia, co znaczy „potęga", „moc". Stało się ono rzymską stolicą Majorki, tętniącym życiem ośrodkiem z forum, świątyniami, domami bogaczy i teatrem.

Dziś możesz przejść się po tych ruinach. Zobaczysz fundamenty rzymskich domów w dzielnicy zwanej La Portella, zarys forum — serca miasta — a nieco dalej rzymski teatr wykuty wprost w skale, najstarszy i największy zachowany teatr antyczny na Balearach. Usiądź na kamiennych stopniach, na których dwa tysiące lat temu siadali widzowie, i wyobraź sobie aktorów na scenie, gwar widowni, zapach oliwnych lampek. Pollentia przetrwała wieki świetności, aż w piątym wieku naszej ery splądrowali ją Wandalowie, a miasto powoli obróciło się w ruinę.

Życie przeniosło się później na pobliskie wzgórze — i stąd wzięła się dzisiejsza Alcúdia, której nazwa pochodzi z arabskiego al-qudya, „wzgórze". W średniowieczu otoczono ją potężnymi murami, które po renowacji możesz dziś obejść niemal w całości, wchodząc na blanki i spoglądając na czerwone dachy starówki. W środku murów czeka klimatyczna plątanina uliczek, kamienne kamieniczki, place z kawiarniami i niewielkie muzeum, w którym zgromadzono znaleziska z rzymskiej Pollentii — monety, ceramikę, rzeźby.

Praktycznie: z Can Picafort dojedziesz tu w jakieś piętnaście minut. Bilet do ruin Pollentii jest niedrogi, zwykle kilka euro, często łącznie z wstępem do muzeum. Najlepiej zwiedzać rano lub późnym popołudniem, bo na otwartym terenie ruin nie ma cienia, a w południe słońce daje mocno w kość — weź wodę i czapkę. Starówkę w murach świetnie połączysz z targiem, który odbywa się tu w wyznaczone dni i wypełnia uliczki straganami. Wieczorem stare miasto jest urzekające, gdy zapala się latarnie, a kamień stygnie po upalnym dniu.

Alcúdia to podróż przez dwa tysiące lat naraz: rzymski teatr, w którym milczy dziś tylko wiatr, i średniowieczne mury, które wciąż otaczają żywe miasto. Stań na blankach, spójrz w stronę morza i pomyśl o procarzach, których bał się sam Rzym, o konsulu zakładającym tu „potęgę", o Wandalach i o wszystkich pokoleniach, które przeszły tymi uliczkami. Niewiele miejsc na wyspie tak namacalnie łączy głęboką starożytność z codziennym dziś.`},
     {n:"Promenada i napis Can Picafort", r:4.7, d:"na miejscu", note:"Wieczorny spacer: napis miasta, wieża Torre d'enfilació, latarnia i rzeźby na wodzie. Świetne na zachód słońca.", q:"Cartell Can Picafort", pod:`Twoja baza, Can Picafort, to dziś żywy, wakacyjny kurort nad zatoką Alcúdii — z promenadą, plażami i gwarem. Ale pod tą letnią, beztroską powłoką kryje się historia znacznie starsza i ciekawsza, niż mogłoby się wydawać. Wystarczy przejść się brzegiem, by ją odkryć.

Zacznijmy od samej nazwy, bo jest urocza. Can Picafort znaczy mniej więcej „dom Picaforta" — od przydomka człowieka, który niegdyś miał tu posiadłość. Jeszcze sto kilkadziesiąt lat temu nie było tu kurortu, lecz garstka domów rybackich i letnich rezydencji rozrzuconych wśród sosen nad pustą plażą. Dopiero w dwudziestym wieku, wraz z modą na wakacje nad morzem, miejscowość rozrosła się w to, czym jest dziś. Spacerując promenadą, popatrz na zatokę: ta sama woda, te same piaski, które kiedyś widzieli nieliczni rybacy, dziś należą do tysięcy gości — ale morze pozostało to samo.

Najlepiej poczujesz ducha tego miejsca o zachodzie słońca. Przejdź się nadmorskim deptakiem, znajdź charakterystyczny napis z nazwą miejscowości — ulubione tło do zdjęć — i popatrz, jak słońce osuwa się ku wodzie, a niebo nad zatoką nabiera barw od złota po róż. Wzdłuż promenady stoją rzeźby i drobne instalacje, a wieczorny spacer z lodami w ręku to jeden z tych prostych rytuałów, które dziecko zapamięta z wakacji najlepiej.

A teraz sekret, o którym wie niewielu turystów. Jeśli ruszysz brzegiem na południowy wschód, wzdłuż wybrzeża, po kilku kilometrach dojdziesz do Son Real — jednego z najbardziej niezwykłych miejsc w okolicy. To prehistoryczna nekropolia położona dosłownie nad samym morzem: kamienne grobowce sprzed blisko trzech tysięcy lat, pochodzące z epoki talajockiej, zbudowane przez tych samych tajemniczych ludzi, którzy wznosili cyklopowe mury w głębi wyspy. Pochówki tuż przy linii fal, owiewane przez sól i wiatr — miejsce, w którym dawni mieszkańcy odprowadzali swoich zmarłych w drogę z widokiem na otwarte morze. Można tam dojść spacerem albo dojechać, a kontrast między wakacyjnym kurortem a tym pradawnym cmentarzem nad wodą robi ogromne wrażenie.

Praktycznie: promenada i napis są na miejscu, w samym Can Picafort, więc to idealny pomysł na wieczór bez planowania — wychodzisz z hotelu i jesteś. Na zachód słońca przyjdź jakieś pół godziny wcześniej, by znaleźć dobre miejsce. Jeśli wybierasz się do nekropolii Son Real, weź wodę, czapkę i wygodne buty, bo nadmorska ścieżka prowadzi przez otwarty, nasłoneczniony teren; najlepiej rano albo późnym popołudniem.

Can Picafort uczy, że nawet zwykły wakacyjny kurort ma swoje warstwy. Pod parasolami i lodziarniami kryje się dawna rybacka osada, a kilka kroków dalej, nad tą samą wodą, śpią zmarli sprzed trzech tysięcy lat. Wystarczy spojrzeć trochę uważniej i pójść trochę dalej, by twoja baza okazała się czymś więcej niż tylko miejscem do spania.`},
     {n:"Monkey Jet Ski Tours", r:5.0, d:"na miejscu", note:"Skutery wodne i wycieczki morskie — mocna atrakcja dla syna. Rezerwacja z wyprzedzeniem.", q:"Monkey Can Picafort Jet Ski Tours"},
     {n:"Cala Mesquida", r:4.6, d:"~40 min", note:"Dzika, piękna plaża z wydmami na wschodzie wyspy. Wycieczka na cały dzień — przyjedź wcześnie po parking.", q:"Cala Mesquida Mallorca", pod:`Na północno-wschodnim krańcu wyspy, z dala od wielkich kurortów, kryje się plaża, która wygląda, jakby czas się przy niej zatrzymał: Cala Mesquida. Szeroki łuk jasnego piasku, turkusowa woda, a za plecami coś, co czyni to miejsce naprawdę wyjątkowym — jeden z najlepiej zachowanych systemów wydmowych całej Majorki.

Większość plaż na wyspie dawno zabudowano hotelami stojącymi tuż przy wodzie. Cala Mesquida oparła się temu losowi. Tutaj, zamiast betonowej ściany budynków, plażę osłania rozległy pas piaszczystych wydm porośniętych trawami i sosnami. Te wydmy to nie ozdoba — to żywy, kruchy ekosystem, dom dla rzadkich roślin i zwierząt, dlatego objęto je ochroną. Po wydmach poprowadzono drewniane kładki, którymi przejdziesz, nie niszcząc roślinności. Idąc nimi ku plaży, masz wrażenie, że wkraczasz do małego rezerwatu, a nie na zwykłe kąpielisko.

Sama zatoka jest piękna i dzika. Woda potrafi mienić się tyloma odcieniami błękitu, że trudno uwierzyć własnym oczom. Ponieważ plaża jest otwarta na otwarte morze, częściej niż w osłoniętej zatoce Alcúdii pojawiają się tu fale — dzieci je uwielbiają, ale w dni z mocniejszym wiatrem trzeba uważać na prądy i pilnować najmłodszych. Z jednej strony plaży zaczynają się ścieżki wiodące przez sosnowy las ku sąsiedniej zatoce Cala Agulla oraz w stronę wzgórz, na których stoi dawna wieża strażnicza Talaia de Son Jaumell — można więc połączyć leniwy dzień na plaży z krótką wędrówką i widokami.

Cala Mesquida ma swój swobodny, nieco bohemski klimat — od dawna lubią ją ci, którzy szukają natury zamiast zatłoczonego deptaka. Część plaży tradycyjnie bywa naturystyczna, zwłaszcza dalej od głównego zejścia, więc warto o tym wiedzieć, jeśli podróżujesz z rodziną — wystarczy zostać bliżej wejścia, gdzie atmosfera jest typowo plażowa.

Praktycznie: z Can Picafort dojedziesz tu w jakieś czterdzieści minut. Parkingów jest kilka, ale w sezonie szybko się zapełniają — przyjedź rano, bo później możesz krążyć w poszukiwaniu miejsca i parkować daleko od plaży. Przy plaży działa bar oraz toalety, ale i tak weź dużo wody, krem i coś do picia, zwłaszcza jeśli planujesz spacer w wydmy lub na wieżę. Zostaw wydmy w spokoju — chodź tylko po kładkach; te piaski odbudowują się dziesiątkami lat. A na koniec ważne ostrzeżenie znane z całej okolicy: nie zostawiaj w samochodzie nic cennego, bo na parkingach przy dzikich plażach zdarzają się włamania.

Cala Mesquida to przypomnienie, jak wyglądała Majorka, zanim przyszły hotele: dzika, piaszczysta, pachnąca sosną i solą. Rozłóż ręcznik, wsłuchaj się w szum fal mocniejszych niż w zatoce, popatrz na trawy kołyszące się na wydmach i poczuj, że trafiłeś na kawałek wybrzeża, które obroniło swoją dzikość. To plaża nie tylko do leżenia — to plaża do oddychania.`}

     {n:"Specialized Muro Rental", r:4.4, d:"~8 min", note:"E-bike Specialized z dobrym zasięgiem — świetne na wypad do s'Albufery albo Alcúdii. Podpowiadają trasy, mały prowiant w pakiecie.", phone:"+34 971 15 00 78", q:"Specialized Mallorca Muro Rental", web:"Specialized Muro rental Playa de Muro"},
     {n:"mallorcaambbici", r:4.7, d:"~6 min", note:"Rodzinna wypożyczalnia z dobrymi rowerami i trafnymi radami co do tras. Uczciwa cena, miła obsługa.", phone:"+34 632 48 77 21", q:"mallorcaambbici Can Picafort", web:"mallorcaambbici Can Picafort"}

   trips:[
     {n:"Coves d'Artà", r:4.7, d:"~35 min", note:"Legendarne jaskinie morskie tuż nad plażą — przewodnik mówi kilkoma językami i robi show z gaszenia świateł. Jedna z najlepszych jaskiń Balearów, maks 1h wycieczki.", q:"Coves d'Artà Mallorca", pod:`Zatrzymaj się na chwilę przed wejściem i spójrz w dół. Stoisz w paszczy ogromnej groty wykutej w klifie, kilkadziesiąt metrów nad morzem, a za twoimi plecami otwiera się widok na turkusową zatokę Canyamel i przylądek Cap Vermell. Witaj w Coves d'Artà — jaskini, która od wieków rozpala wyobraźnię ludzi.

Te pieczary nie są dziełem człowieka, lecz wody i czasu. Przez miliony lat krople nasączone wapieniem budowały tu las stalaktytów i stalagmitów, kolumn i kaskad skalnych. Najsłynniejsza z nich to potężny filar zwany Królową Kolumn — ma około dwudziestu dwóch metrów wysokości, jedna z najwyższych formacji tego typu w Europie. Gdy przewodnik na chwilę gasi światła, zapada absolutna ciemność, a potem kolejne reflektory rozświetlają komory tak, że masz wrażenie, jakbyś wszedł do wnętrza katedry wyrzeźbionej przez naturę.

Ale Coves d'Artà to także historia. Kiedy w tysiąc dwieście dwudziestym dziewiątym roku Jakub Pierwszy Zdobywca wylądował na Majorce i ruszył na muzułmańskie wojska, część mieszkańców wyspy — mówi się, że nawet kilkuset — schroniła się właśnie w tych jaskiniach, licząc, że ciemność i labirynt komór ocalą im życie. Później przez stulecia groty służyły jako kryjówka przemytników, którzy ukrywali tu towar z dala od oczu władzy.

W dziewiętnastym wieku jaskinia przyciągnęła naukowców. Eksplorował ją słynny francuski speleolog Édouard-Alfred Martel, ojciec nowoczesnego jaskiniowizmu, ten sam, który badał najsłynniejsze pieczary Europy. A pewna legenda — powtarzana z dumą przez miejscowych — głosi, że ogrom i tajemniczość Coves d'Artà zainspirowały Juliusza Verne'a, gdy pisał „Podróż do wnętrza Ziemi". Czy to prawda, czy piękna opowieść? Tego nikt nie potwierdzi. Ale gdy staniesz pod Królową Kolumn i spojrzysz w mrok ciągnący się w głąb skały, sam zaczniesz w to wierzyć.

W środku panuje chłód — około dwudziestu stopni — niezależnie od skwaru na zewnątrz, więc w upalny dzień to także wytchnienie. Zwiedzanie odbywa się z przewodnikiem i trwa mniej więcej czterdzieści minut. Przewodnicy bywają tu prawdziwymi gawędziarzami, mówią kilkoma językami i potrafią zrobić z wizyty mały spektakl. Dla dzieci to wielka przygoda — schody, echo, gra świateł i poczucie, że schodzi się do innego świata.

Praktycznie: jaskinie leżą przy plaży Canyamel, około trzydziestu pięciu minut jazdy z Can Picafort. Biletów zwykle nie trzeba rezerwować z wyprzedzeniem, wycieczki ruszają co kilkadziesiąt minut, ale przyjedź wcześniej, bo w środku dnia ustawiają się kolejki. Załóż buty z dobrą podeszwą — kamienne stopnie bywają wilgotne i śliskie. Świetnie łączy się to ze zwiedzaniem pobliskiego Capdepery albo dnia spędzonego w okolicach Artà.

Kiedy wyjdziesz z powrotem na światło, przystań jeszcze przy wyjściu. Za sobą zostawiasz ciemność, która ukrywała uchodźców, przemytników i podobno natchnęła wielkiego pisarza. Przed tobą — błękit morza i słońce. Coves d'Artà to jedno z tych miejsc, gdzie historia, natura i legenda splatają się w jedno, w wilgotnym chłodzie skały, która pamięta więcej niż my wszyscy razem wzięci.`},
     {n:"Artà — Sant Salvador", r:4.6, d:"~30 min", note:"Forteca-sanktuarium na wzgórzu z widokiem na całe wschodnie wybrzeże. Stare miasto z brukowanymi uliczkami, gratis. Łącz z Ses Paisses i Coves d'Artà na pełny dzień wschód.", q:"Santuari de Sant Salvador Artà Mallorca", pod:`Z daleka wygląda jak forteca z bajki: wzgórze nad miasteczkiem Artà, ukoronowane potężnymi, blankowanymi murami, do których prowadzą schody obsadzone cyprysami. To Santuari de Sant Salvador — miejsce, które przez wieki było jednocześnie świątynią, schronieniem i strażnicą.

Zacznijmy od samego Artà, bo to jedno z najpiękniejszych miasteczek wschodniej Majorki. Wąskie, brukowane uliczki pną się pod górę, mijasz kamienne domy w odcieniach piaskowca, a w każdy wtorek plac wypełnia targ, na który schodzą się okoliczni rolnicy z warzywami, serami, oliwkami i wyrobami ze skóry. To miasteczko żyje własnym, niespiesznym rytmem, z dala od nadmorskiego zgiełku.

A nad wszystkim góruje wzgórze sanktuarium. Co ciekawe, to miejsce było święte i strategiczne na długo przed chrześcijaństwem — już w epoce talajockiej, trzy tysiące lat temu, ludzie wykorzystywali ten punkt, bo stąd widać całą okolicę. Później, w czasach muzułmańskich, stała tu warownia, a po podboju wyspy przez Jakuba Pierwszego mury rozbudowano, by chronić mieszkańców. Gdy nadciągali korsarze albo zaraza pustoszyła dolinę, ludność chroniła się za tymi blankami jak w azylu. Wewnątrz murów wznosi się kościół, w obecnej formie przebudowany w dziewiętnastym wieku, z izbą pełną sakralnych skarbów, szat i relikwii.

Wejdź na mury i obejdź je dookoła. Widok zapiera dech: pod tobą dachy Artà, dalej rozległa równina opadająca ku morzu, łagodne wzgórza Serra de Llevant, a przy dobrej pogodzie błękit zatoki. To jeden z tych punktów, z których rozumiesz geografię całej wschodniej części wyspy naraz. O zachodzie słońca kamienie nabierają miodowej barwy, a całe wzgórze tonie w ciepłym świetle.

Dotrzeć tu można na dwa sposoby. Pieszo, od strony miasteczka, schodami drogi krzyżowej — to kilkanaście minut marszu w cieniu cyprysów, z których każdy zakręt odsłania coraz szerszą panoramę. Albo autem, drogą wokół wzgórza, jeśli oszczędzasz nogi. Na górze działa skromna kawiarnia, gdzie usiądziesz z kawą i widokiem.

Praktycznie: wstęp jest bezpłatny, a samo wzgórze świetnie łączy się z dwoma sąsiednimi atrakcjami. U podnóża, dosłownie kilkaset metrów dalej, leży prehistoryczna osada Ses Païsses z cyklopowymi murami sprzed trzech tysięcy lat. A nieco dalej na wschód czekają zamek w Capdeperze i jaskinie Coves d'Artà. Można z tego ułożyć jeden bogaty dzień: poranek wśród kamieni epoki brązu, południe na murach sanktuarium, popołudnie w jaskini albo na plaży.

Z Can Picafort dojedziesz tu w jakieś trzydzieści minut. Zaparkuj na obrzeżach starego miasta i wejdź pieszo — i tak warto przejść się tymi uliczkami. Załóż wygodne buty, bo bruk bywa nierówny, a do sanktuarium prowadzi pod górę.

Kiedy będziesz stał na murach, z wiatrem we włosach i całą okolicą u stóp, pomyśl o wszystkich, którzy chronili się tu przez wieki: przed piratami, przed zarazą, przed niepewnym losem. Sant Salvador to nie tylko widokowy taras. To kamienna pamięć miasteczka, które przez stulecia spoglądało z tej góry, czy od strony morza nie nadciąga niebezpieczeństwo.`},
     {n:"Capdepera Castle", r:4.5, d:"~35 min", note:"Średniowieczny zamek nad miasteczkiem, €3, widok do Minorki. Łatwy dla dzieci, 30–60 min zwiedzania. Blisko Cala Mesquida.", q:"Castell de Capdepera Mallorca", pod:`Na wzgórzu nad miasteczkiem Capdepera, na samym wschodnim krańcu Majorki, stoi coś rzadkiego: nie pojedyncza wieża, lecz cała ufortyfikowana osada zamknięta w obrębie murów. To Castell de Capdepera — średniowieczna twierdza, która kryje jedną z najpiękniejszych legend wyspy.

Zamek powstał z woli króla Jakuba Drugiego Majorki, około roku tysiąc trzysetnego. Władca kazał przenieść okolicznych mieszkańców w bezpieczne miejsce na szczycie i otoczyć je murem — tak narodziła się warowna wioska, w której za blankami mieściły się domy, kościół i cysterny na wodę. Z tej wysokości strażnicy obejmowali wzrokiem całe wybrzeże, wypatrując żagli korsarzy, którzy przez stulecia byli prawdziwą zmorą wyspy.

I tu zaczyna się legenda, którą w Capdeperze opowiada się do dziś. Pewnego razu pod mury podeszła wroga flota — w niektórych wersjach berberyjscy piraci, w innych wojska podczas oblężenia. Obrońcy, słabsi i mniej liczni, nie mieli szans w otwartej walce. W rozpaczy zwrócili się ku małej, gotyckiej figurce Matki Boskiej, którą czczono w zamkowej kaplicy — Mare de Déu de l'Esperança, Matki Bożej Nadziei. Modlili się żarliwie i wtedy, jak głosi opowieść, znad morza nagle nadciągła gęsta mgła, która spowiła całe wzgórze i ukryła miasteczko przed oczami napastników. Wróg, nie mogąc znaleźć celu, odstąpił. Figurka, która miała ocalić Capdeperę, do dziś stoi w kaplicy na terenie zamku.

Spaceruj wzdłuż murów, wejdź na wieżę i rozejrzyj się. Pod tobą rozsypane białe domy Capdepery, dalej port Cala Rajada, a na horyzoncie — przy naprawdę czystym niebie — zarys sąsiedniej wyspy, Minorki. To jeden z niewielu punktów na Majorce, z których widać siostrzaną wyspę.

Warto znać jeszcze jedną twarz tego miasteczka. Capdepera od pokoleń słynie z wyplatania wyrobów z liści palmy karłowatej — rzemiosła zwanego llatra. Z tych włókien powstają kosze, kapelusze, torby i maty, a tradycja jest tak żywa, że co roku miasteczko organizuje wielki jarmark średniowieczny, podczas którego uliczki wypełniają stragany, muzyka, rzemieślnicy i inscenizacje z epoki.

Praktycznie: bilet do zamku jest niedrogi, kilka euro, płatność zwykle kartą. Z Can Picafort dojedziesz tu w jakieś trzydzieści pięć minut. Sam zamek zwiedzisz w pół godziny do godziny, ale uwaga — czasem znalezienie miejsca do parkowania w wąskich uliczkach miasteczka zajmuje dłużej niż samo zwiedzanie, więc uzbrój się w cierpliwość i celuj w parking poniżej murów. Załóż czapkę i weź wodę, bo na górze nie ma cienia, a kamienie potrafią mocno nagrzać się w słońcu. W okolicy znajdują się też latarnia Capdepera i piękne plaże Cala Agulla i Cala Mesquida, więc łatwo połączyć zamek z kąpielą.

Kiedy będziesz schodził w dół wąskimi uliczkami, obejrzyj się na mury górujące nad miasteczkiem. Pomyśl o nocy, gdy znad morza nadciągnęła ratunkowa mgła, i o pokoleniach, które za tymi blankami szukały schronienia. Capdepera to nie tylko ładny widok — to opowieść o strachu, nadziei i cudzie, zaklęta w kamieniu.`},
     {n:"Cap de Formentor", r:null, d:"~45 min", note:"Latarnia na klifach 200 m nad morzem, epicki widok. Sprawdź dostęp: latem może wymagać busa z Barcares. Wcześnie rano — pusta droga, złota godzina.", warn:"Latem droga częściowo zamknięta dla aut — sprawdź przed wyjazdem.", q:"Cap de Formentor lighthouse Mallorca", pod:`Ruszamy na samą krawędź wyspy. Z zatoki Alcúdii jedziemy na północ, przez Pollençę, a potem droga zaczyna się wspinać i wić nad morzem ku miejscu, w którym Majorka po prostu się kończy — ku Cap de Formentor. To długi, skalisty półwysep wbijący się w morze jak ostrze, smagany wiatrem z obu stron naraz. Miejscowi mówią, że tu spotykają się wiatry, i kiedy wysiądziesz z auta, od razu zrozumiesz dlaczego.

Drogę, którą jedziemy, zaprojektował w latach trzydziestych inżynier Antonio Parietti — ten sam, który stworzył słynną serpentynę do Sa Calobry. Tutaj poprowadził asfalt po krawędzi klifów, nad przepaściami spadającymi prosto do wody. Po drodze koniecznie zatrzymaj się na punkcie widokowym Es Colomer — patrzysz stąd na samotną skałę sterczącą z morza i na poszarpane zatoki. Tuż nad nim, na wzgórzu, sterczy kamienna wieża Talaia d'Albercutx z szesnastego wieku. Takie wieże stawiano wzdłuż całego wybrzeża, by ostrzegać przed korsarzami z Afryki Północnej: gdy wartownik dostrzegał piracki żagiel, zapalał ogień, a sygnał biegł od wieży do wieży w głąb lądu, dając wsiom czas na ucieczkę.

Na samym końcu cypla, na wysokości około dwustu dziesięciu metrów nad falami, stoi latarnia morska. Zbudował ją inżynier Emili Pou, a światło zapłonęło w tysiąc osiemset sześćdziesiątym trzecim roku — początkowo zasilane oliwą z oliwek. Pomyśl, czego to wymagało: zanim powstała droga, każdy kamień, każdą belkę i każdą beczkę oliwy trzeba było dowieźć morzem i wciągnąć po stromiznie. Latarnik spędzał tu samotne tygodnie, mając za towarzystwo tylko wiatr i światło, które co noc słał w ciemność dla żeglarzy.

Formentor ma też swoją złotą, kosmopolityczną legendę. W tysiąc dziewięćset dwudziestym dziewiątym roku argentyński poeta i marzyciel Adan Diehl wzniósł tu, wśród sosen nad ukrytą plażą, luksusowy Hotel Formentor. Wielki, elegancki hotel na krańcu trudno dostępnej wyspy był aktem szaleństwa — a jednak ściągnął tu największych: malującego pejzaże Winstona Churchilla, gwiazdy kina jak Grace Kelly, arystokratów i dyplomatów. W tysiąc dziewięćset sześćdziesiątym pierwszym roku hotel wpisał się w historię literatury: ustanowiono tu nagrodę Prix Formentor, której pierwszą edycję podzielili między siebie Jorge Luis Borges i Samuel Beckett.

Stań na cyplu i spójrz wstecz na wyspę. Zobaczysz całą Serra de Tramuntana ciągnącą się ku horyzontowi, błękit zatoki Pollença i bezkres otwartego morza. Ukryta poniżej, wśród sosen, plaża Formentor uchodzi za jedną z najpiękniejszych na wyspie.

Ważna uwaga praktyczna: z Can Picafort to jakieś czterdzieści pięć minut drogi, ale latem, mniej więcej od maja do października, dojazd na sam cypel prywatnym autem bywa zakazany — ze względu na korki na wąskiej szosie. Sprawdź aktualne zasady przed wyjazdem; ostatni odcinek pokonasz wtedy autobusem wahadłowym z plaży albo z Port de Pollença. Najlepiej przyjedź wcześnie rano albo o zachodzie, gdy klify płoną pomarańczem, a tłumy znikają. Wtedy Formentor pokazuje swoją prawdziwą twarz: dziką, samotną i piękną — koniec lądu, za którym jest już tylko wiatr i woda.`},
     {n:"Platja des Coll Baix", r:4.5, d:"~30 min", gem:true, note:"Sekretna plaża za 45-min hike przez las sosnowy i skały. Brak hamakow, brak barów, krystaliczna woda. Jedno z najpiękniejszych miejsc wyspy. Odpowiednie buty — klapki nie przejdą.", warn:"Parking = znana strefa włamań do aut. Zostawiaj tylko absolutne minimum w samochodzie.", q:"Platja des Coll Baix Alcúdia Mallorca", pod:`Ta wyprawa to mały sekret. Większość gości zatoki Alcúdii nie ma pojęcia, że tuż obok, za zalesionym półwyspem, kryje się jedna z najpiękniejszych i najdzikszych plaż całej wyspy — Platja des Coll Baix. Nie dotrzesz tu autem. I właśnie dlatego jest taka, jaka jest.

Plaża leży u stóp półwyspu La Victòria, masywu wyrastającego z morza na wschód od Alcúdii. To miejsce o ciekawej, częściowo wojskowej przeszłości — sąsiedni przylądek Cap des Pinar przez dziesięciolecia był terenem zamkniętym, strefą wojskową, co paradoksalnie ocaliło tę okolicę przed zabudową. Dziś to dziki, sosnowy raj. Po drodze możesz zajrzeć do Ermita de la Victòria — siedemnastowiecznej pustelni, która w czasach najazdów korsarzy służyła okolicznym mieszkańcom jako schronienie i punkt obronny.

Żeby dotrzeć na plażę, dojeżdżasz autem do parkingu na końcu drogi, a potem zaczyna się przygoda. Najpierw idziesz leśną ścieżką wśród sosen — jakieś trzydzieści, czterdzieści pięć minut łagodnej wędrówki, w cieniu, z zapachem żywicy w powietrzu. Potem ścieżka opada stromo w dół, a ostatni odcinek to zejście po dużych kamieniach, które wymaga uwagi i rąk do pomocy. I wtedy, zza skał, otwiera się ona: półksiężyc jasnego, grubego piasku i kamieni, woda w odcieniach od szmaragdu po głęboki granat, a nad wszystkim strome, zalesione zbocza. Brak barów, brak leżaków, brak parasoli. Tylko morze, cisza i poczucie, że trafiłeś do miejsca, którego nie tknął masowy ruch.

Właśnie ta dzikość jest największym skarbem Coll Baix — i jednocześnie wymaga od ciebie samodzielności. Zabierz wodę, jedzenie, czapkę i wszystko, czego możesz potrzebować, bo na miejscu nie kupisz niczego. Woda bywa głębsza i chłodniejsza niż na płytkich plażach zatoki, a dno kamieniste, więc buty do wody się przydadzą.

I teraz najważniejsze ostrzeżenie, którego nie wolno zlekceważyć: parking przy szlaku to znana strefa włamań do samochodów. Złodzieje wybijają szyby i przeszukują auta, gdy turyści schodzą na plażę. Nie zostawiaj w środku absolutnie niczego cennego — żadnych toreb, plecaków, dokumentów, sprzętu. Najlepiej zabierz wszystko ze sobą albo nie zostawiaj w aucie nic, co kusi oko. Lepiej dźwigać plecak na plażę niż wrócić do wybitej szyby.

Praktycznie: z Can Picafort to około trzydziestu minut do parkingu plus marsz. Załóż solidne buty — klapki tu naprawdę nie przejdą, zwłaszcza na końcowym zejściu po skałach. Wyrusz rano, bo parking jest mały i szybko się zapełnia, a w upale wędrówka bywa męcząca. Z dziećmi oceń realnie ich siły — to nie jest plaża „wysiadasz z auta i jesteś".

Ale jeśli dasz radę, nagroda jest ogromna. Siądziesz na tej ukrytej plaży, otoczony klifami i lasem, z wodą czystą jak szkło, i poczujesz coś, co na zatłoczonej Majorce zdarza się coraz rzadziej: że masz kawałek dzikiego wybrzeża niemal wyłącznie dla siebie. Coll Baix nie przychodzi łatwo — i właśnie dlatego zostaje w pamięci.`},
     {n:"Talaia de Son Jaumell", r:4.8, d:"~40 min", gem:true, note:"Średniowieczna wieża strażnicza z widokiem 360° — w pogodny dzień widać Minorkę. Hike ~40 min od Cala Mesquida, stromy odcinek na końcu (ręce się przydają). Wschód słońca tu to osobne przeżycie.", q:"Talaia de Son Jaumell Capdepera Mallorca", pod:`Na wschodnim krańcu Majorki, nad plażami Capdepery, wznosi się skalisty szczyt zwieńczony samotną, okrągłą wieżą. To Talaia de Son Jaumell — dawna wieża strażnicza, a dziś jeden z najpiękniejszych punktów widokowych całej wyspy, o którym wie zaskakująco niewielu turystów.

Żeby zrozumieć, po co tu stoi, trzeba cofnąć się do czasów, gdy największym zagrożeniem dla wyspiarzy nie była burza, lecz człowiek. Przez stulecia wybrzeża Majorki nękali korsarze z Afryki Północnej: przypływali znienacka, palili wioski, rabowali i uprowadzali ludzi w niewolę. Odpowiedzią była sieć kamiennych wież obserwacyjnych rozsianych po najwyższych punktach wybrzeża. Talaia de Son Jaumell, wzniesiona mniej więcej w szesnastym lub siedemnastym wieku, była jednym z ogniw tego łańcucha. Wartownik wypatrywał z niej pirackich żagli, a gdy je dostrzegał, zapalał ogień. Sygnał biegł od wieży do wieży wzdłuż całego wybrzeża, ostrzegając kolejne osady — to był majorkański system alarmowy sprzed wieków, działający z prędkością światła ognia.

Z tej wieży roztacza się widok absolutnie wyjątkowy: pełne trzysta sześćdziesiąt stopni. Pod tobą poszarpane wybrzeże z zatokami Cala Mesquida i Cala Agulla, dalej miasteczko i zamek Capdepery, latarnia na przylądku, a przy czystym niebie — zarys Minorki na horyzoncie. To jeden z nielicznych punktów, z których naprawdę widać sąsiednią wyspę. O wschodzie słońca, gdy pierwsze promienie zapalają morze, miejsce robi się wręcz nierzeczywiste — ci, którzy się tu wdrapali o świcie, mówią o nim jak o osobnym przeżyciu.

Ale to perełka, która wymaga wysiłku. Na szczyt nie prowadzi droga — trzeba podejść pieszo, najczęściej od strony plaży Cala Mesquida albo Cala Agulla. Marsz zajmuje jakieś czterdzieści minut do godziny i przez większość jest przyjemny, ale ostatni odcinek, jakieś sto, dwieście metrów, robi się stromy i kamienisty — miejscami trzeba wspomóc się rękami. To nie jest trudna wspinaczka, ale wymaga uwagi i porządnych butów. W klapkach ani się waż.

Praktycznie: z Can Picafort dojedziesz w okolice Cala Mesquida w jakieś czterdzieści minut, zostawiasz auto i dalej idziesz na piechotę. Wyrusz wcześnie rano albo pod wieczór — nie tylko dla światła i widoków, lecz także dlatego, że na szlaku nie ma cienia, a w środku dnia słońce daje tu mocno w kość. Zabierz dużo wody, czapkę i krem. Z dziećmi oceń realnie ich siły, bo końcowy odcinek może być dla najmłodszych za stromy.

I jeszcze jedno: ścieżki w tej okolicy potrafią się rozgałęziać, a część szlaków to dzikie, kozie ścieżyny. Warto mieć w telefonie mapę trekkingową, żeby nie zboczyć z trasy.

Kiedy w końcu staniesz przy tej kamiennej wieży, z wiatrem szarpiącym włosy i całym wschodnim krańcem wyspy u stóp, pomyśl o wartownikach, którzy spędzali tu długie noce, wpatrzeni w ciemne morze. Czuwali, by ich bliscy w dolinie mogli spać spokojnie. Dziś ty wchodzisz tu po coś zupełnie innego — po widok i ciszę. Ale wieża stoi tak samo jak wtedy, niewzruszona, patrząc w stronę, z której kiedyś przychodziło niebezpieczeństwo.`},
     {n:"Ermita de Betlem", r:4.5, d:"~40 min", gem:true, note:"Odległy klasztor na klifach — 8 km wąską górską drogą przez las. Absolutna cisza i widok na zatokę. Prawie nieznane wśród turystów.", q:"Ermita de Betlem Artà Mallorca", pod:`Jeśli masz ochotę na dzień z dala od plażowego gwaru, ruszamy w góry. Z zatoki Alcúdii kierujemy się ku miasteczku Artà, a stamtąd wąska, kręta droga zaczyna piąć się w pasmo Serra de Llevant — do Ermita de Betlem, jednej z najbardziej odludnych i najcichszych pustelni całej Majorki.

Sama droga jest częścią przygody: jakieś osiem kilometrów serpentyn wśród skał i niskiego lasu, z widokami, od których zapiera dech. Im wyżej, tym ciszej, tym mniej ludzi, aż w pewnym momencie świat na dole znika, a ty masz wrażenie, że wjeżdżasz do zupełnie innej epoki.

Pustelnię założono w tysiąc osiemset piątym roku. Grupa pustelników, duchowych spadkobierców tradycji świętych Pawła i Antoniego, szukała miejsca jak najdalej od zgiełku — i trudno o lepszy wybór. Zakonnicy żyli tu w skrajnej prostocie: wydarli górze maleńkie tarasowe poletka, hodowali kilka zwierząt, czerpali wodę ze źródła zwanego Font de s'Ermita, modlili się i milczeli. Ich cały świat zamykał się w tych murach i w widoku rozciągającym się aż po zatokę Alcúdii — tę samą, nad którą teraz nocujesz.

Nazwa Betlem, czyli Betlejem, nie jest przypadkowa. W sercu kaplicy kryje się scena narodzenia umieszczona w czymś na kształt groty — jakby fragment betlejemskiej jaskini przeniesiony w góry Artà. Wejdź do środka, gdy nikogo nie ma. Półmrok, chłód kamienia, zapach świec. Usiądź na ławce i posłuchaj. Usłyszysz tylko własny oddech i czasem wiatr ocierający się o mury. Pielgrzymi, którzy tu docierają, często mówią to samo: że poczuli się bliżej czegoś, czego nie umieją nazwać.

Pustelnia jest też bramą do dzikich zakątków wybrzeża. Z okolicy prowadzą szlaki ku ukrytym plażom półwyspu Artà — jak kamienista Platja des Verger czy zatoczka Es Caló — do których nie dojedziesz autem, tylko dojdziesz pieszo, przez las i skały. To jeden z ostatnich naprawdę nietkniętych fragmentów wyspy, częściowo objęty ochroną przyrodniczą jako park natury.

Wokół samej pustelni jest skromnie i — przyznajmy szczerze — miejscami zaniedbane. Część terenu bywa ogrodzona, fontanna ze statuą Marii nie zawsze w najlepszym stanie. Ale właśnie ta surowość, ten brak turystycznego wygładzenia, sprawiają, że Betlem jest prawdziwe. To nie atrakcja przygotowana pod sprzedaż biletów, lecz miejsce, które od ponad dwustu lat żyje własnym, powolnym rytmem.

Praktycznie: z Can Picafort to jakieś czterdzieści minut jazdy. Droga w górę jest wąska, więc prowadź ostrożnie — gdy z naprzeciwka nadjedzie inne auto, ktoś musi cofnąć się do mijanki; nie spiesz się. Pustelnia bywa otwarta w ciągu dnia, ale godziny potrafią być kapryśne, więc warto je sprawdzić. Weź wodę i wygodne buty, jeśli chcesz przejść okolicznymi ścieżkami.

Wracając krętą drogą w dół, zatrzymaj się przy którymś z zakrętów i obejrzyj za siebie: mały biały budynek przyklejony do góry, otoczony bezkresem skał i nieba. Pomyśl o ludziach, którzy wybrali to miejsce na całe życie — z dala od wszystkiego, blisko jedynie ciszy. W świecie, który nigdy nie milczy, Ermita de Betlem oferuje rzecz dziś bezcenną: spokój, którego nie da się kupić.`},
     {n:"Finca Raixa (Bunyola)", r:4.7, d:"~55 min", gem:true, note:"Historyczna posiadłość z XVIII-wiecznym ogrodem, oliwnikami, fontanną i stawem. Darmowe wstęp i parking. Po drodze lub w połączeniu z Sóllerem.", shut:"pon i niedz zamknięte", q:"Raixa Bunyola Mallorca", pod:`Po drodze między Palmą a Sóller, u stóp gór Tramuntany, kryje się miejsce, które wygląda, jakby ktoś przeniósł kawałek toskańskiej willi w sam środek majorkańskich oliwników. To Finca Raixa — historyczna posiadłość z ogrodami w stylu włoskiego renesansu, jedno z najpiękniejszych i wciąż mało obleganych miejsc na wyspie.

Jej historia sięga znacznie głębiej, niż mogłoby się wydawać. Sama nazwa, Raixa, wywodzi się z arabskiego — w czasach, gdy wyspą władali muzułmanie, istniała tu andaluzyjska farma, korzystająca z przemyślnego systemu nawadniania, który pozwalał zazielenić suchy stok. Te wodne tradycje przetrwały wieki i do dziś sercem posiadłości jest woda: kanały, fontanny i wielki kamienny zbiornik na szczycie ogrodu.

Prawdziwy rozkwit przyszedł jednak pod koniec osiemnastego wieku, za sprawą barwnej postaci — kardynała Antonia Despuiga i Dameto. Ten majorkański duchowny i człowiek renesansu spędził lata we Włoszech, gdzie zachwycił się antykiem i ogrodami rzymskich willi. Wróciwszy, postanowił przekształcić Raixę na ich wzór. Sprowadził rzeźby i antyczne znaleziska — część pochodziła z wykopalisk pod Rzymem — i rozmieścił je wśród tarasów, schodów i fontann. Powstał ogród, w którym kamienne posągi spoglądają spomiędzy cyprysów i drzew cytrusowych, a woda spływa kaskadami po zboczu. To była rezydencja marzeń oświeconego arystokraty, miejsce do rozmów o sztuce, filozofii i historii.

Spaceruj bez pośpiechu. Wejdź po monumentalnych schodach na górny taras, do wielkiego zbiornika wodnego, w którym przeglądają się niebo i drzewa, i odwróć się: pod tobą rozciąga się cały ogród, a dalej dolina i góry. W samym budynku posiadłości urządzono dziś wystawę poświęconą Serra de Tramuntana — jej przyrodzie, historii i ludziom, którzy ją kształtowali. Wokół ciągną się gaje oliwne ze starymi, powykręcanymi drzewami, z których część pamięta czasy znacznie dawniejsze niż kardynał.

Najlepsze jest to, że dziś Raixa należy do wszystkich. Na początku dwudziestego pierwszego wieku posiadłość wykupiły władze wyspy i otworzyły ją dla publiczności. Wstęp jest bezpłatny, parking również — rzadki luksus na Majorce.

Praktycznie: Raixa leży w gminie Bunyola, przy drodze z Palmy do Sóller, jakieś pięćdziesiąt pięć minut jazdy z Can Picafort. Dojazd kończy się odcinkiem polnej, kamienistej drogi wśród oliwek — jedź powoli, ale spokojnie, da się tędy przejechać zwykłym autem. Bardzo ważne: sprawdź dni otwarcia, bo posiadłość jest zamknięta w poniedziałki i niedziele, a w pozostałe dni czynna tylko do wczesnego popołudnia. Weź wodę, bo na miejscu nie ma kawiarni; za to idealnie nadaje się tu piknik w cieniu drzew. Świetnie łączy się tę wizytę z wyprawą do pobliskiego Sóller.

Kiedy będziesz schodził z górnego tarasu, mijając kamienne posągi wśród zieleni, pomyśl o kardynale, który dwieście lat temu chciał stworzyć tu kawałek Włoch na śródziemnomorskiej wyspie — i o arabskich ogrodnikach, którzy wieki wcześniej nauczyli tę ziemię gromadzić wodę. Raixa to spotkanie kultur, epok i marzeń, ukryte na zboczu, którego większość turystów nigdy nie odnajduje.`}

/* ---------- safe storage (works hosted, no-op in sandbox) ---------- */
const store = {
  get(k){ try{ return JSON.parse(localStorage.getItem(k)) }catch(e){ return mem[k] } },
  set(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)) }catch(e){ mem[k]=v } }
};
const mem = {};

/* ---------- render ---------- */
const main = document.getElementById('main');
const nav = document.getElementById('nav');
const esc = s => String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function renderLogi(t){
  const steps = t.steps.map((s,i)=>{
    const key = `done:${t.id}:${i}`;
    const done = store.get(key) ? 'done' : '';
    const mapBtn = (s.mapq) ? `<a class="btn btn-map" target="_blank" rel="noopener" href="${maps(s.mapq)}">📍 Mapy</a>` : '';
    const conf = s.conf ? `<span class="badge b-conf" data-copy="${esc(s.conf)}">📋 ${esc(s.conf)}</span>` : '';
    const warn = s.warn ? `<div class="badge b-warn">⚠️ ${esc(s.warn)}</div>` : '';
    const tip = s.tip ? `<div class="badge b-tip">💡 ${esc(s.tip)}</div>` : '';
    const list = s.list ? `<ul>${s.list.map(l=>`<li>${esc(l)}</li>`).join('')}</ul>` : '';
    return `<div class="step ${done}" data-key="${key}">
      <div class="node">${done?'✓':''}</div>
      <div class="card">
        <span class="time-chip">🕘 ${esc(s.time)}</span>
        <h4>${esc(s.title)}</h4>
        ${s.where?`<div class="where">${esc(s.where)}</div>`:''}
        ${list}
        ${conf}${warn}${tip}
        <div class="actions">
          ${mapBtn}
          <button class="btn btn-check ${done?'on':''}" data-check="${key}">${done?'✓ Zrobione':'Oznacz'}</button>
        </div>
      </div>
    </div>`;
  }).join('');
  const introPods = t.id==='arr' ? `
    <div class="base" style="margin-top:1.5rem">
      <h3>🎧 Na podróż — posłuchajcie razem</h3>
      <p class="note" style="margin:.4rem 0 1rem">Trzy audycje na lotnisko i samolot. Dla dorosłych i dzieci 10–12 lat. Skopiuj tekst do ElevenLabs Reader i słuchajcie razem — każda ok. 20 minut.</p>
      <div class="place" style="margin-bottom:.75rem">
        <div class="top"><h4>Historia Majorki 🏛️</h4><span class="rate">~20 min</span></div>
        <p class="note">Od tajemniczych procarzy epoki brązu przez Rzym, Arabów i krucjatę Jakuba Pierwszego — aż po piratów i boom turystyczny. Cała wyspa w 20 minutach.</p>
        <div class="actions"><button class="btn btn-pod" data-pod="intro-hist">🎧 Podcast</button></div>
      </div>
      <div class="place" style="margin-bottom:.75rem">
        <div class="top"><h4>Kuchnia i smaki Majorki 🍊</h4><span class="rate">~20 min</span></div>
        <p class="note">Ensaïmada, pa amb oli, sobrassada (zmieniła ją Ameryka!), migdały Arabów, wino z rdzennych szczepów i churros przy plaży. Co i dlaczego koniecznie zjeść.</p>
        <div class="actions"><button class="btn btn-pod" data-pod="intro-food">🎧 Podcast</button></div>
      </div>
      <div class="place">
        <div class="top"><h4>Co was czeka — top atrakcje 🗺️</h4><span class="rate">~20 min</span></div>
        <p class="note">Droga do Sa Calobry (węzeł krawata!), jaskinie, zamki, flamingos, sępy, doliny z kozami i plaże bez drogi. Kompletny teaser tego, co przed wami.</p>
        <div class="actions"><button class="btn btn-pod" data-pod="intro-attr">🎧 Podcast</button></div>
      </div>
    </div>` : '';
  return `<div class="sec-head"><div class="day">${esc(t.day)}</div><h2>${esc(t.title)}</h2><p>${esc(t.sub)}</p></div>
    <div class="timeline">${steps}</div>
    ${t.routeNote?renderRouteNote(t.routeNote):''}
    ${t.bikeNote?renderBikeNote(t.bikeNote):''}
    ${introPods}`;
}

function renderBikeNote(b){
  const links = b.links.map(l=>`<a class="btn btn-map" target="_blank" rel="noopener" href="${maps(l.q)}">📍 ${esc(l.n)}</a>`).join('');
  return `<div class="base bike-note"><h3>🚲 ${esc(b.title)}</h3><p class="note">${esc(b.text)}</p><div class="actions">${links}</div></div>`;
}

function bikeCard(p){
  const map = `<a class="btn btn-map" target="_blank" rel="noopener" href="${maps(p.q)}">📍 Mapy</a>`;
  const web = `<a class="btn" target="_blank" rel="noopener" href="${websearch(p.web)}">🌐 Strona</a>`;
  const tel = p.phone?`<a class="badge b-conf" href="tel:${p.phone.replace(/\s/g,'')}">📞 ${esc(p.phone)}</a>`:'';
  const tags = p.d?`<span class="tag dist">📍 ${esc(p.d)}</span>`:'';
  return `<div class="place">
    <div class="top"><h4>${esc(p.n)}</h4><span class="rate">★ ${p.r.toFixed(1)}</span></div>
    <div class="tags">${tags}</div>
    <p class="note">${esc(p.note)}</p>
    ${tel}
    <div class="actions">${map}${web}</div>
  </div>`;
}

PODS['intro-hist']={title:'Historia Majorki 🏛️', text:`Wyobraź sobie, że jesteś skałą. Dużą, ciepłą skałą pośrodku Morza Śródziemnego, na którą przez tysiące lat przybijają kolejni przybysze — w skórzanych sandałach, w żelaznych zbrojach, w jedwabnych szatach, w mundurach, z walizkami na kółkach. Wszyscy chcieli kawałka ciebie. Wszyscy zostawili po sobie jakiś ślad. Tą skałą jest Majorka — wyspa, na którą właśnie lecicie, i wyspa, której historia jest jedną z najbardziej kolorowych w całej Europie.

Zaczniemy od naprawdę głębokiej przeszłości.

Kiedy jeszcze nie było ani Grecji, ani Rzymu, ani tym bardziej Polski, na Majorce żyli już ludzie. Pierwsze ślady obecności człowieka sięgają sześciu do siedmiu tysięcy lat temu. Można ich sobie wyobrazić jako myśliwych, którzy przepłynęli z Półwyspu Iberyjskiego na prymitywnych łodziach — wielka odwaga, bo wody Morza Śródziemnego bywały równie nieprzewidywalne jak dziś.

Ale prawdziwa cywilizacja rozkwitła tu mniej więcej trzy tysiące lat temu, w epoce brązu, i zostawiła coś, co do dziś stoi w środku wyspy: tajemnicze kamienne wieże zwane talajotami. Kultura talajocka budowała z ogromnych głazów bez żadnego cementu — układała je jeden na drugim z taką precyzją, że ściany przetrwały trzy tysiąclecia. Odwiedzicie Ses Païsses i dotkniecie tych kamieni. Zapamiętajcie ten moment: wasza dłoń dotykać będzie czegoś, co wznosiły ludzkie ręce trzy tysiące lat temu.

I teraz kawałek historii, który zapamiętają szczególnie ci z was, którzy lubią bitwy i gry wojenne.

Lud talajocki miał jedną umiejętność, która sprawiła, że bały się go wszystkie ówczesne armie. Mówię o procy. Balearczycy byli najsłynniejszymi procarzami starożytnego świata. Twierdzono, że ćwiczono ich od niemowlęctwa: matka podobno kładła chłopcu kawałek chleba na paliku i pozwalała mu zjeść dopiero wtedy, gdy strącił go procą. Wyobraź sobie takie śniadanie! Efekty były druzgocące. Ołowiane kulistki wystrzelone z balearskiej procy leciały z prędkością, którą dziś porównuje się do pocisków pistoletowych. Potrafiły przebić hełm albo trafić wroga z odległości ponad stu metrów. Dlatego Kartagińczycy — ci sami, co walczyli z Rzymem — najmowali Balearczyków jako elitarną piechotę. Hannibal, słynny wódz, który przeprowadził słonie przez Alpy, miał w swojej armii balearskich procarzy. Ich ołowiane kulistki znaleziono na polach bitew w całej zachodniej Europie. A sama nazwa Baleary — według jednej z teorii — pochodzi od greckiego słowa oznaczającego właśnie: rzucać.

Tak wyglądała wyspa, gdy podpłynęły do niej fenickie statki handlowe, a potem greckie. Handlowali, wymieniali towary — ceramikę za metale, wino za zboże — ale nie próbowali podbijać. Mądrzy ludzie.

Rzym nie był aż tak ostrożny.

W sto dwudziestym trzecim roku przed naszą erą na Majorkę przybył rzymski konsul Kwintus Cecyliusz Metellus. Wyspy nie podbito łatwo — balearskich procarzy nie dawało się zignorować — ale w końcu Rzym wygrał, bo zawsze wygrywał. Metellus założył dwa miasta: Pollentię w miejscu dzisiejszej Alcúdii i Palma, tam gdzie dziś stoi stolica wyspy. Przez kilkaset lat Majorka była spokojną rzymską prowincją. Uprawiano oliwki i pszenicę, budowano drogi, kąpano się w łaźniach. W Pollentii stał teatr wykuty w skale — i możecie go zobaczyć w Alcúdii, bo zachował się do dziś.

A potem przyszli Wandalowie.

W czwartym i piątym wieku naszej ery Cesarstwo Rzymskie zaczęło się rozpadać. Barbarzyńskie plemiona przetaczały się przez Europę. Wandalowie w pięćset piętnastym roku przejęli Baleary. Cywilizacja, jaką znamy, runęła w ciągu jednego pokolenia. Po Wandalach przyszli Bizantyjczycy i przez jakiś czas wyspa była znowu częścią cesarstwa, tym razem ze stolicą w Konstantynopolu.

Ale prawdziwa rewolucja nadchodziła ze wschodu.

W dziewięćset drugim roku naszej ery na Majorce wylądowały wojska muzułmańskie. Wyspa weszła w skład al-Andalus — ogromnego arabskiego państwa zajmującego prawie całą Iberię. Przez ponad trzysta lat Majorka była al-Mayurqą, a jej stolica — Medina Mayurqa, dzisiejsza Palma. I tu historia robi coś nieoczekiwanego: arabski okres był dla wyspy jednym z najlepszych. Muzułmańscy rolnicy przywieźli umiejętność zarządzania wodą. Budowali aljubs — podziemne cysterny zbierające deszczówkę — oraz sieci nawadniające tereny, które wcześniej były jałowe. I dzięki wodzie posadzili drzewa, które rosną tu do dziś: pomarańcze, migdały, figi, morele. Kiedy będziecie jeść na Majorce ensaïmadę z marmoladą migdałową albo mijać gaje pomarańczowe w Sóller — to jest właśnie arabskie dziedzictwo. Sama nazwa al-Mayurqa przetrwała w formie „Majorka".

Rok tysiąc dwieście dwudziesty dziewiąty był jednak wielkim przełomem.

Jaume Pierwszy, król Aragonii, postanowił odzyskać wyspę dla chrześcijańskiej Europy. We wrześniu jego flota — ponad sto pięćdziesiąt statków z szesnastoma tysiącami żołnierzy — pojawiła się na horyzoncie. To była największa ekspedycja morska, jaką zachodnie Morze Śródziemne widziało do tej pory. Arabski gubernator podobno powiedział na widok armady: „Nie ma siły, która mogłaby to powstrzymać." Nie mylił się. Po kilku miesiącach oblężenia, trzydziestego pierwszego grudnia, chrześcijańskie wojska wkroczyły do Mediny Mayurqy. Jaume Pierwszy — El Conqueridor, Zdobywca — stał się bohaterem narodowym i do dziś ma ten status.

W tysiąc dwieście siedemdziesiątym szóstym roku jego syn ogłosił Majorkę samodzielnym królestwem. Przez kilkadziesiąt lat wyspa kwitła: handel, piękne kościoły i zamki, a majorkańscy kartografowie tworzyli mapy uznawane za najdokładniejsze w Europie. Ale królestwo było za małe i za biedne, by przetrwać — w tysiąc trzysta czterdziestym trzecim roku ponownie weszła w skład Aragonii, tym razem na stałe.

A potem nadeszła era nieustannego strachu.

Przez piętnasty, szesnasty i siedemnasty wiek najgroźniejsi ludzie Morza Śródziemnego to berberyjscy korsarze z północnej Afryki. Napadali na nadmorskie wioski, zabijali i uprowadzali ludzi w niewolę. Odpowiedzią była sieć wież strażniczych — takie, jakie zobaczycie podczas podróży po wyspie, stojące na każdym wzgórzu przy morzu. Kiedy wartownik dostrzegał piracki żagiel, zapalał ogień, a sygnał biegł od wieży do wieży wzdłuż całego wybrzeża. W tysiąc pięćset pięćdziesiątym roku słynny korsarz Dragut zaatakował Pollençę — mieszkańcy obronili miasto, a to zwycięstwo świętują tam każdego roku wielkim widowiskiem.

Wiek osiemnasty przyniósł wojnę dynastyczną. Po śmierci ostatniego Habsburga wybuchła Wojna o Sukcesję Hiszpańską, a Majorka postawiła na przegrywającą stronę. Gdy wygrali Burbonowie, wyspa zapłaciła surowo — straciła przywileje i autonomię. Ale to był ostatni wielki polityczny wstrząs na długi czas.

Dziewiętnasty wiek to stopniowe budzenie: budowa dróg przez góry, handel cytrusami z Francją, pierwsze statki parowe. A wiek dwudziesty? Zmienił Majorkę bardziej niż wszystkie poprzednie podboje razem wzięte. Na początku lat sześćdziesiątych wybuchła turystyka masowa. Wybudowano lotnisko, hotele, restauracje. Liczba gości urosła z niespełna stu tysięcy rocznie do ponad piętnastu milionów. Majorka stała się jednym z najpopularniejszych celów podróży w Europie.

I tak historia zatoczyła dziwne koło. Wyspa, która przez tysiące lat walczyła z kolejnymi najeźdźcami, teraz musi bronić się przed zbyt dużą liczbą życzliwych gości — chronić parki przyrody, ograniczać ruch w górach, pilnować dzikich plaż. To dlatego, jeśli zobaczycie autobus wahadłowy blokujący dostęp do pięknego zakątka, albo tabliczkę „wejście na własny rachunek" — wiecie już skąd to pochodzi.

Gdy za chwilę wylądujecie w Palmie i poczujecie ciepłe powietrze, pamiętajcie: pod tym niebem żyli procarze, Rzymianie, Maurowie, krzyżowcy i piratów tysiące. Każdy kamień, każda wieża, każde pole migdałowe ma swoją opowieść. I na dwanaście dni ta opowieść jest też wasza.`};
PODS['intro-food']={title:'Kuchnia i smaki Majorki 🍊', text:`Powiedzmy sobie szczerze: na Majorkę lecicie nie tylko dla morza i zabytków. Lecicie też dla jedzenia. I dobrze, bo ta wyspa ma na swoim talerzu jedną z najciekawszych historii kulinarnych w basenie Morza Śródziemnego. Przygotujcie się — każde danie, które zjececie w ciągu tych dwunastu dni, ma za sobą co najmniej kilkusetletnią historię.

Zacznijmy od rzeczy najważniejszej: ensaïmady.

Ensaïmada to majorkańskie ciastko spiralne, które wygląda jak drożdżowa ślimacznica, a smakuje jak mięciutki, lekko słodki sen. Jest tak charakterystyczna dla wyspy, że ma europejski certyfikat oryginalności — można ją legalnie nazwać ensaïmadą tylko wtedy, gdy pochodzi z Majorki. Nazwa pochodzi od majorkańskiego słowa saïm, które oznacza... smalec. Bo tak, to ciastko tradycyjnie robi się ze smalcem, który nadaje mu ten jedwabisty, niepowtarzalny smak. Kiedy w siedemnastym wieku kupcy majorkańscy handlowali z całą Europą, wieźli na pokładach ensaïmady jako prezenty. Dziś każda rodzina wylatująca z lotniska w Palmie niesie okrągłe pudełko — to ono pachnie Majorką.

Można ją jeść czystą, posypaną cukrem pudrem, albo z nadzieniem. Najpopularniejsze warianty to z cabell d'àngel — słodką marmoladą z dyni o konsystencji złotych nitek — albo z sobrassadą, którą zaraz wam przedstawię. Małe dzieci zwykle wybierają wersję z czekoladą. Dobrzy rodzice pozwalają zjeść ensaïmadę na śniadanie każdego ranka. To jest oficjalnie zdrowe, bo jesteście na wakacjach.

Ale przejdźmy do czegoś, co zaskakuje prawie wszystkich. Podstawowe danie Majorki to nie żaden skomplikowany przepis — to pa amb oli. Po polsku dosłownie: chleb z oliwą. Weźmiesz gruby kawał rustykalnego chleba wiejskiego, przetrzesz go przekrojonym pomidorem, tak żeby wsiąknął sok i miąższ, polasz to dobrą oliwą z oliwek, posypiesz gruboziarnistą solą morską — i gotowe. Pa amb oli jada się na każdą porę dnia. Na śniadanie, na kolację, na przekąskę o każdej godzinie. I jest fenomenalne.

Dlaczego tak proste danie może być aż tak dobre? Tu kryje się sekret lokalnych składników. Majorkańska oliwa z oliwek pochodzi z drzew, z których część ma ponad tysiąc lat. Tak, tysiąc lat. Rosły tu, gdy na wyspie rządzili arabscy emirowie. Ich korzenie sięgają głębiej niż większość europejskich katedr. Oliwa z takich drzew ma smak, który trudno porównać z tym, co kupuje się w polskim supermarkecie. A pomidory uprawiane na słońcu Majorki smakują jak skondensowane lato. Pa amb oli to filozofia — że najlepsze jedzenie nie wymaga skomplikowania. Wymaga tylko jakości.

Teraz coś dla miłośników mocniejszych smaków: sobrassada.

Sobrassada to kiełbasa — ale jaka kiełbasa! Wytwarzana wyłącznie z wieprzowiny, mieszanej z papryką ostrą i słodką, wcierana w jelito i suszona. Ma konsystencję miękkiej pasty, kolor ceglastoczerwony i smak, który — gdy jest dobra — jest tak bogaty i złożony, jak dojrzały ser. Jada się ją rozsmarowaną na chleb (znowu pa amb oli!), topioną z miodem na grzankach albo wkładaną do ensaïmady.

Ale tu pojawia się niezwykły fragment historii: sobrassada wygląda tak jak wygląda przez Kolumba. Serio. Papryka, która nadaje jej czerwony kolor i charakterystyczny smak, pochodzi z Ameryki Środkowej. Przed odkryciem Nowego Świata — przed rokiem tysiąc czterysta dziewięćdziesiątym drugim — żadna europejska kiełbasa nie była czerwona. Majorkańska sobrassada była wtedy czarna od pieprzu. Kiedy papryką dotarła do Europy przez Hiszpanię w szesnastym wieku, kucharze Majorki natychmiast ją pokochali i włączyli do swoich przetworów. Od tego momentu minęło niecałe pięćset lat, a dziś trudno wyobrazić sobie tę wyspę bez czerwonej sobrassady.

Mówiliśmy o arabskim dziedzictwie w historii — teraz wróćmy do niego w kuchni, bo jest wszędzie. Tumbet to danie, które przypomnina nieco ratatouille: warzywa — ziemniaki, bakłażany, cukinia, papryka, pomidory — pieczone warstwami z oliwą. Proste, sycące, doskonałe. Arabowie uprawiali bakłażany na Majorce już w dziesiątym wieku, gdy Europa jeszcze nie wiedziała, że takie warzywo w ogóle istnieje. Arròs brut, czyli dosłownie „brudny ryż", to coś pomiędzy zupą a risotto: ryż gotowany razem z mięsem, grzybami, warzywami i przyprawami, aż wszystko zleje się w jeden ciemny, aromatyczny, pożywny kocioł. Nazwa nie brzmi zachęcająco, ale to jedno z najtradycyjniejszych i najbardziej majorkańskich dań na wyspie.

Teraz koniec historii, chwila przyjemności: migdały.

Migdały na Majorce są wszędzie. Rośną w tysiącach sadów — zwłaszcza w centrum wyspy — i kwitną w lutym, gdy całą wyspę okrywa biały i różowy dywan kwiatów. Arabowie posadzili tu pierwsze migdałowce, a dziś są podstawą wielu słodyczy. Gató d'ametlla to surowe ciasto migdałowe, wilgotne i ciężkie, często podawane z lodami z cynamonu — to najsławniejszy majorkański deser. Robiols to małe pierożki z ciasta kruchego, nadziewane marmoladą lub serem, które je się na Wielkanoc. Crespells to kruche ciasteczka w kształcie gwiazd i kwiatów, które można znaleźć w każdej piekarni. I turrón — majonez z migdałów i miodu, który Europejczycy znają jako nougat.

A co pić? Majorka ma swoje własne wino. Z miejscowych, rdzennych szczepów winorośli — zwłaszcza z czerwonej Manto Negro i białej Prensal Blanc — wytwarza się wino objęte chronioną nazwą Binissalem. Robili to jeszcze Rzymianie, potem Arabowie (oczywiście bez alkoholu), a potem znowu chrześcijanie po podboju. Jeśli do obiadu podadzą wam coś lokalnego czerwonego — spróbujcie. A na koniec wieczoru można zamówić herbes: domową nalewkę z ziół zbieranych w górach Tramuntany, zieloną lub brązową, słodką albo gorzką. Każda rodzina ma swój przepis, przekazywany od pokoleń.

I jeszcze jedno, bo już lądujemy: llangonissa, czyli małe majorkańskie kiełbaski z fenkułem smażone na grillu; fritura de matances, czyli tradycyjne danie po uboju świni w zimie; i calderet, czyli zupa rybna z Menorki, którą jednak podają też na Majorce. Oraz churros na śniadanie w El Puerto przy plaży Can Picafort — ciasto smażone w głębokim oleju, maczane w gorącej czekoladzie. Dzieci, to punkt obowiązkowy.

Mała lista dla tych, którzy chcą zaliczyć wszystko:
Ensaïmada każdego ranka — nieobowiązkowe, ale zalecane.
Pa amb oli przynajmniej raz — to filozofia życia.
Sobrassada z miodem na grzance — połączenie, które zaskakuje.
Gató d'ametlla z lodami cynamonowymi — najlepszy deser wyspy.
Arròs brut w jakiejś starej knajpie śródlądowej — autentyczny smak Majorki.
Churros z czekoladą przy plaży — obowiązkowo z dziećmi.

Kuchnia Majorki to nie haute cuisine. To proste, mocne, uczciwe jedzenie, które pachnie tysiącem lat historii, arabskim nawadnianiem, Kolumbowym odkryciem i migdałowym sadem kwitnącym w lutym. Jeśli będziecie tu jeść to, co jedzą miejscowi, wrócicie do domu nie tylko z opalonymi nosami, ale i z czymś, za czym będziecie tęsknić przez długi czas.`};
PODS['intro-attr']={title:'Co was czeka — top atrakcje 🗺️', text:`Dobrze. Siedzicie w samolocie albo na lotnisku, za oknem poczekalni drzewa, które znacie. Za kilka godzin jednak wylądujecie tam, gdzie drzewa są inne, morze inne, kamienie inne. Chciałbym wam teraz zrobić jeden rzecz: przygotować was na to, co zobaczycie. Nie dlatego, że będzie to trudne albo dziwne — ale dlatego, że jeśli wiecie, na co patrzeć, poczujecie dwa razy więcej.

Zacznijmy od pytania, które zadaje sobie większość ludzi jadących na Majorkę po raz pierwszy: co to za wyspa? Plaże? Hotele? Imprezy? Tak, to wszystko tam jest. Ale Majorka to przede wszystkim coś, czego się nie spodziewa większość odwiedzających: to wyspa górska. Centrum wyspy to pasmo Serra de Tramuntana, które od 2011 roku jest wpisane na Listę Światowego Dziedzictwa UNESCO — obok Machu Picchu, Angkoru i Wenecji. Szczyty sięgają niemal tysiąca pięciuset metrów. Z jednej strony gór — urwiste klify spadające do morza. Z drugiej — łagodne doliny z gajami oliwnymi, sadami migdałowymi i maleńkimi wioskami z kamiennymi domami.

A między morzem a górami — historia tak gęsta, że można by na niej śniadanie posmarować.

Zacznijmy od tego, co najprawdopodobniej zostanie wam w pamięci na najdłużej: drogi. Majorka ma kilka tras, które są same w sobie atrakcją. Jedna z nich to zjazd do Sa Calobry — kilkanaście kilometrów zakrętów nad urwiskiem, zbudowanych przez inżyniera Pariettiego w latach trzydziestych dwudziestego wieku. Jest jeden zakręt, który przechodzi sam pod własnym wiaduktem, zawracając o pełne trzysta sześćdziesiąt stopni. Kierowcy i kolarze jeżdżą tu z całego świata specjalnie dla tego momentu. A na dole czeka kanion, którego ściany mają blisko dwieście metrów wysokości i zwężają się do kilku metrów szerokości. Wejdziecie w tę szczelinę, spojrzycie w górę i poczujecie się jak na dnie słoja.

Potem jedzie się do Cap de Formentor: zakończenie długiego półwyspu wbitego w morze, skąd widać w obie strony jednocześnie. Tam, na klifach dwieście metrów nad falami, stoi latarnia morska czynna od tysiąc osiemset sześćdziesiątego trzeciego roku. Przed nią jest punkt widokowy Es Colomer, od którego odpłynąć nie można. Widzieliście kiedyś morze z wysokości, na której normalnie latają samoloty regionalne? Tak mniej więcej wygląda ten widok.

Ale żeby zobaczyć coś naprawdę starożytnego, jedziemy do Ses Païsses. Talajocka osada sprzed trzech tysięcy lat, z murami z głazów tak wielkich, że Grecy myśleli, iż mogły je wznieść tylko cyklopy. Bramę tworzą trzy monolityczne płyty — każda waży kilka ton. Kto je tu doniósł i jak? Tego nie wiemy. Na pewno nie mieli dźwigów. I co ciekawe, nie wiemy nawet, po co budowali te wieże-talajoty. Do obserwacji? Do kultu? Do składowania zboża? Archeolodzy kłócą się o to do dziś. Niektóre tajemnice są piękne właśnie dlatego, że nie mają odpowiedzi.

Jedną z największych niespodzianek dla dzieci będą jaskinie. Coves de Campanet leżą dosłownie pięć minut od waszego pierwszego domu na wyspie — mała, spokojna, odkryta w tysiąc dziewięćset czterdziestym piątym roku przez robotników szukających wody, zamiast wody znaleźli cały podziemny pałac. Wewnątrz temperatura wynosi osiemnaście stopni — w upalny dzień jak klimatyzacja — a w środku rosną stalaktyty tak cienkie jak makaron. Jaskinie d'Artà są z kolei na wschodnim wybrzeżu: ich wejście to ogromna grota w klifie nad morzem i mówi się, że zainspirowane nimi były „Podróż do wnętrza Ziemi" Juliusza Verne'a. W jednej z sal rośnie kolumna skalnakatana zwana Królową Kolumn, mierząca dwadzieścia dwa metry wysokości.

Teraz zamki i sanktuaria. Capdepera to nie pojedyncza wieża, lecz cała osada w murach na szczycie wzgórza, założona przez króla Jakuba Drugiego około roku tysiąc trzysta. W środku jest kaplica, w której stoi gotycka figurka Matki Bożej, która — według legendy — pewnej nocy sprawiła, że nad oblężonym miastem opadła gęsta mgła i napastnicy odeszli nic nie widząc. Sant Salvador w Artà to forteczne sanktuarium z blankowanymi murami, do którego wchodzi się schodami wyłożonymi cyprysami; z murów widać niemal cały wschód wyspy. A Puig de Maria to wzgórze o trzystu trzydziestu trzech metrach, na którym zbudowano sanktuarium w czasie epidemii czarnej śmierci w czternastym wieku — wejście kosztuje dwadzieścia do trzydziestu minut na piechotę, nagroda to widok od zatoki Pollença aż po Alcúdię.

Osobny rozdział to przyroda. W parku s'Albufera — wielkim mokradle między waszym pierwszym i drugim domem — mieszka ponad trzysta gatunków ptaków. Flamingosą tam regularnym gościem. Moustached warbler, czaple, zimorodki. A w górach Tramuntany krąży sęp kasztanowaty — ptak o rozpiętości skrzydeł bliskiej trzem metrom. Prawie wyginął w latach osiemdziesiątych: zostało ich mniej niż dwadzieścia. Dziś jest ich ponad trzysta, bo grupa ludzi postanowiła, że nie pozwoli na ich zniknięcie. Kiedy zobaczycie ogromny cień na górskim zboczu, patrzcie w górę: może to właśnie on.

Dla miłośników pieszych wypraw: Dolina Bóquer za Port de Pollença, gdzie chodzą półdzikie kozy i gdzie można zobaczyć sokoła Eleonory. Plaża Coll Baix, do której nie jedzie się autem — idzie się pół godziny przez sosnowy las, a potem schodzi po kamieniach, a nagrodą jest plaża, której nie znajdziecie w żadnym folderze. Torrent de Pareis — kanion, w którym raz do roku śpiewają chóry, a ściany mają dwieście metrów i kilka metrów szerokości.

I jeszcze miasteczka. Sóller z tramwajem, który jeździ od tysiąc dziewięćset trzynastego roku, z fasadą kościoła zaprojektowaną przez ucznia Gaudiego i z festiwalem, na którym co roku reenaktują bitwę z piratami z roku tysiąc pięćset sześćdziesiątego pierwszego. Pollença z trzystu sześćdziesięcioma pięcioma schodami prowadzącymi na wzgórze, po których każdy Wielki Piątek w milczeniu znosi się figurę Chrystusa. Artà, gdzie w każdy wtorek jest targ i gdzie można wejść na wzgórze sanktuarium i zobaczyć talajotycką osadę w jednym dniu.

Jedno zdanie podsumowania, zanim wylądujemy: to nie jest wyspa, którą ogląda się z leżaka. To wyspa, którą się chodzi, się wspina, się wchodzi w głąb jaskiń i wąwozów, wdrapuje na wieże i schodzi na ukryte plaże. Majorka nagradza ciekawość. Im więcej zechcecie zobaczyć, tym więcej dostaniecie.

A teraz zapiąć pasy. Lądujemy.`};
function tripCard(p){
  const map = `<a class="btn btn-map" target="_blank" rel="noopener" href="${maps(p.q)}">📍 Mapy</a>`;
  const img = `<a class="btn" target="_blank" rel="noopener" href="${gimg(p.q)}">🖼️ Zdjęcia</a>`;
  let pod='';
  if(p.pod){ const id='pod'+(++podSeq); PODS[id]={title:p.n, text:p.pod}; pod=`<button class="btn btn-pod" data-pod="${id}">🎧 Podcast</button>`; }
  const gemTag = p.gem?`<span class="tag gem">🔮 perełka</span>`:'';
  const driveTag = p.d?`<span class="tag dist">🚗 ${esc(p.d)}</span>`:'';
  const shutTag = p.shut?`<span class="tag shut">⛔ ${esc(p.shut)}</span>`:'';
  const warn = p.warn?`<div class="badge b-warn">⚠️ ${esc(p.warn)}</div>`:'';
  const ratingEl = p.r?`<span class="rate">★ ${p.r.toFixed(1)}</span>`:'<span class="rate">— odkryj</span>';
  return `<div class="place">
    <div class="top"><h4>${esc(p.n)}</h4>${ratingEl}</div>

    <p class="note">${esc(p.note)}</p>

  </div>`;
}

function renderStay(t){
  const b=t.base;
  const stars = b.stars?`<span class="stars">${'★'.repeat(b.stars)}</span>`:'';
  const rows = b.rows.map(r=>`<div class="kv"><span class="k">${esc(r[0])}</span><span class="v">${esc(r[1])}</span></div>`).join('');
  const poi = t.poi.map(placeCard).join('');
  const eat = t.eat.map(placeCard).join('');
  const bike = (t.bike||[]).map(bikeCard).join('');

  const routes = (BIKE_ROUTES[t.id]||[]).map(renderRouteCard).join('');

/* ---------- auto-tab by date ---------- */
function autoTab(){
  const now=new Date();
  const yr=now.getFullYear(), mo=now.getMonth()+1, d=now.getDate();
  let tab='arr'; // default: show arrival
  if(yr===2026 && mo===6){
    if(d===6)       tab='arr';
    else if(d<=12)  tab='finca';
    else if(d===13) tab='swap';
    else if(d<=17)  tab='picafort';
    else            tab='ret';
  } else if(new Date()>new Date('2026-06-18T23:59:00+02:00')){
    tab='ret'; // after trip — show return tab
  }
  go(tab);
}
autoTab();

/* ---------- interactions ---------- */
function go(id){
  document.querySelectorAll('section').forEach(s=>s.classList.toggle('active', s.id==='sec-'+id));
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on', b.dataset.go===id));
  document.getElementById('main').scrollTo?.(0,0);
  window.scrollTo({top:0,behavior:'smooth'});
}
let toastT;
function toast(msg){
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),1400);
}

document.addEventListener('click',(e)=>{
  const goBtn=e.target.closest('[data-go]');
  if(goBtn){ go(goBtn.dataset.go); return; }

  const seg=e.target.closest('[data-list]');
  if(seg){
    const wrap=seg.closest('.seg'); const sec=wrap.parentElement;
    wrap.querySelectorAll('button').forEach(b=>b.classList.toggle('on', b===seg));
    sec.querySelectorAll('[data-pane]').forEach(p=>p.style.display = (p.dataset.pane===seg.dataset.list)?'':'none');
    return;
  }

  const chk=e.target.closest('[data-check]');
  if(chk){
    const key=chk.dataset.check; const now=!store.get(key); store.set(key, now);
    const step=document.querySelector(`.step[data-key="${key}"]`);
    step.classList.toggle('done', now);
    step.querySelector('.node').textContent = now?'✓':'';
    chk.classList.toggle('on', now); chk.textContent = now?'✓ Zrobione':'Oznacz';
    return;
  }

  const cp=e.target.closest('[data-copy]');
  if(cp){
    const v=cp.dataset.copy;
    (navigator.clipboard?.writeText(v) || Promise.reject()).then(()=>toast('Skopiowano: '+v)).catch(()=>toast(v));
    return;
  }

  const pod=e.target.closest('[data-pod]');
  if(pod){ openPod(pod.dataset.pod); return; }
  if(e.target.id==='podCopy'){ copyPod(); return; }
  if(e.target.id==='podClose' || e.target.id==='podModal'){ closePod(); return; }
});

let curPod=null;
const podModal=document.getElementById('podModal');
function openPod(id){
  const p=PODS[id]; if(!p) return; curPod=id;
  document.getElementById('podTitle').textContent=p.title;
  document.getElementById('podBody').textContent=p.text;
  document.getElementById('podBody').scrollTop=0;
  podModal.classList.add('open');
}
function closePod(){ podModal.classList.remove('open'); }
function copyPod(){
  if(!curPod) return; const t=PODS[curPod].text;
  (navigator.clipboard?.writeText(t) || Promise.reject())
    .then(()=>toast('Skopiowano podcast — wklej do ElevenReader'))
    .catch(()=>toast('Zaznacz i skopiuj tekst ręcznie'));
}

function drawRouteMap(el, coords){
  const W=360, H=240;
  el.innerHTML='';
  const canvas=document.createElement('canvas');
  canvas.width=W*2; canvas.height=H*2; // retina
  canvas.style.cssText='width:100%;height:100%;display:block;border-radius:10px';
  el.appendChild(canvas);
  const ctx=canvas.getContext('2d');
  const S=2; // retina scale

  // bounds with padding
  const lats=coords.map(c=>c[0]), lngs=coords.map(c=>c[1]);
  const minLat=Math.min(...lats)-0.005, maxLat=Math.max(...lats)+0.005;
  const minLng=Math.min(...lngs)-0.005, maxLng=Math.max(...lngs)+0.005;

  // OSM tile math
  function ll2t(lat,lng,z){
    const n=1<<z, r=lat*Math.PI/180;
    return{x:Math.floor(n*(lng+180)/360),
           y:Math.floor(n*(1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2)};
  }
  function t2ll(tx,ty,z){
    const n=1<<z;
    return{lng:tx/n*360-180,
           lat:Math.atan(Math.sinh(Math.PI*(1-2*ty/n)))*180/Math.PI};
  }

  // pick zoom: stay under 3×3 tiles
  let zoom=13;
  for(let z=15;z>=10;z--){
    const a=ll2t(maxLat,minLng,z), b=ll2t(minLat,maxLng,z);
    if(b.x-a.x<=3 && b.y-a.y<=3){zoom=z;break;}
  }

  const tl=ll2t(maxLat,minLng,zoom), br=ll2t(minLat,maxLng,zoom);
  const tx0=tl.x, ty0=tl.y, tx1=br.x, ty1=br.y;
  const tcols=tx1-tx0+1, trows=ty1-ty0+1;

  // scale tiles to canvas (with small margin)
  const TILE=256;
  const sc=Math.min((W*S-8)/(tcols*TILE),(H*S-8)/(trows*TILE));
  const tp=TILE*sc;
  const ox=(W*S-tcols*tp)/2, oy=(H*S-trows*tp)/2;

  // geo → canvas pixel
  const orig=t2ll(tx0,ty0,zoom), end2=t2ll(tx1+1,ty1+1,zoom);
  const spanLng=end2.lng-orig.lng, spanLat=orig.lat-end2.lat;
  const toX=lng=>ox+(lng-orig.lng)/spanLng*tcols*tp;
  const toY=lat=>oy+(orig.lat-lat)/spanLat*trows*tp;

  const dark=window.matchMedia('(prefers-color-scheme:dark)').matches;

  // tile URL: light or dark (CartoDB)
  const tileUrl=(z,x,y)=>dark
    ?`https://cartodb-basemaps-a.global.ssl.fastly.net/dark_all/${z}/${x}/${y}.png`
    :`https://tile.openstreetmap.org/${z}/${x}/${y}.png`;

  // draw OSM background while loading
  ctx.fillStyle=dark?'#1a2024':'#aad3df';
  ctx.fillRect(0,0,W*S,H*S);

  function drawRoute(){
    // route glow
    ctx.shadowColor='rgba(14,140,124,.5)'; ctx.shadowBlur=8*S;
    ctx.beginPath(); ctx.strokeStyle='#0e8c7c'; ctx.lineWidth=4*S;
    ctx.lineJoin='round'; ctx.lineCap='round';
    coords.forEach((c,i)=>{
      i?ctx.lineTo(toX(c[1]),toY(c[0])):ctx.moveTo(toX(c[1]),toY(c[0]));
    });
    ctx.stroke();
    ctx.shadowBlur=0;

    // markers
    function dot(lat,lng,clr){
      const x=toX(lng),y=toY(lat),r=9*S;
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle=clr; ctx.fill();
      ctx.strokeStyle='white'; ctx.lineWidth=2.5*S; ctx.stroke();
    }
    dot(coords[0][0],coords[0][1],'#0e8c7c');
    dot(coords[coords.length-1][0],coords[coords.length-1][1],'#f1875a');

    // attribution
    ctx.font=`${9*S}px sans-serif`;
    ctx.fillStyle='rgba(0,0,0,.5)';
    ctx.fillText('© OpenStreetMap contributors',6*S,H*S-4*S);
  }

  // load tiles
  let done=0, total=tcols*trows;
  if(total===0){drawRoute();return;}

  for(let tx=tx0;tx<=tx1;tx++){
    for(let ty=ty0;ty<=ty1;ty++){
      const img=new Image();
      img.crossOrigin='anonymous';
      const dx=ox+(tx-tx0)*tp, dy=oy+(ty-ty0)*tp;
      img.onload=()=>{
        ctx.drawImage(img,dx,dy,tp,tp);
        if(++done===total) drawRoute();
      };
      img.onerror=()=>{ if(++done===total) drawRoute(); };
      img.src=tileUrl(zoom,tx,ty);
    }
  }
}

function openRoute(id, base){
  const list=BIKE_ROUTES[base]||[];
  const r=list.find(x=>x.id===id); if(!r) return;
  document.getElementById('rteTitle').textContent=r.name;
  const metaEl=document.getElementById('rteMeta');
  metaEl.innerHTML=`<span class="rt-stat">🚴 ${r.km} km</span><span class="rt-stat">⛰️ ${esc(r.elev)}</span><span class="rt-stat">⏱️ ${esc(r.time)}</span><span class="rt-diff ${r.diff}" style="margin-left:4px">${esc(r.diffLab)}</span>`;
  const ptsEl=document.getElementById('rtePts');
  ptsEl.innerHTML=r.pts.map(p=>`<li>${esc(p)}</li>`).join('');
  document.getElementById('rteGmaps').href=r.gmaps;
  rteModal.classList.add('open');
  requestAnimationFrame(()=>drawRouteMap(document.getElementById('rteMap'), r.coords, r.name));
}

function closeRoute(){ rteModal.classList.remove('open'); }
document.getElementById('rteClose').addEventListener('click',closeRoute);
document.getElementById('rteCloseBtn').addEventListener('click',closeRoute);
rteModal.addEventListener('click',e=>{ if(e.target===rteModal) closeRoute(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closePod(); closeRoute(); }});

document.addEventListener('click',e=>{
  const btn=e.target.closest('[data-route]');
  if(btn){ openRoute(btn.dataset.route, btn.dataset.base); }
});

/* ---------- countdown ---------- */
function tickCountdown(){
  const dep=new Date('2026-06-06T10:10:00+02:00');
  const now=new Date();
  const diff=dep-now;
  const el=document.getElementById('cd');
  if(diff<=0){ el.textContent='W trakcie podróży'; return; }
  const d=Math.floor(diff/864e5), h=Math.floor(diff%864e5/36e5);
  el.textContent = d>0 ? `Do wylotu: ${d} dni ${h} h` : `Do wylotu: ${h} h`;
}
tickCountdown(); setInterval(tickCountdown,60000);

/* ---------- service worker ---------- */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
