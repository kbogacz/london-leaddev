  return `<div class="place">
    <div class="top"><h4>${esc(p.n)}</h4><span class="rate">★ ${p.r.toFixed(1)}</span></div>
    <div class="tags">${tags}</div>
    <p class="note">${esc(p.note)}</p>
    <div class="actions">${map}${img}</div>
  </div>`;
}

function renderStay(t){
  const b=t.base;
  const stars = b.stars?`<span class="stars">${'★'.repeat(b.stars)}</span>`:'';
  const rows = b.rows.map(r=>`<div class="kv"><span class="k">${esc(r[0])}</span><span class="v">${esc(r[1])}</span></div>`).join('');
  const poi = t.poi.map(placeCard).join('');
  const eat = t.eat.map(placeCard).join('');
  const bike = (t.bike||[]).map(bikeCard).join('');
  const trip = (t.trips||[]).map(tripCard).join('');
  return `<div class="sec-head"><div class="day">${esc(t.day)}</div><h2>${esc(t.title)}</h2><p>${esc(t.sub)}</p></div>
    <div class="base"><h3>${esc(b.name)} ${stars}</h3><div class="sub">${esc(b.sub)}</div>${rows}</div>
    <div class="seg" data-seg="${t.id}">
      <button class="on" data-list="poi">🗺️ Atrakcje</button>
      <button data-list="eat">🍽️ Knajpy</button>
      <button data-list="bike">🚲 Rowery</button>
      <button data-list="trip">🚗 Wycieczki</button>
    </div>
    <div data-pane="poi">${poi}</div>
    <div data-pane="eat" style="display:none">${eat}</div>
    <div data-pane="bike" style="display:none">${bike}</div>
    <div data-pane="trip" style="display:none">${trip}</div>`;
}

// build sections + nav
TABS.forEach((t,idx)=>{
  const sec=document.createElement('section');
  sec.id='sec-'+t.id;
  sec.innerHTML = t.type==='logi'?renderLogi(t):renderStay(t);
  if(idx===0) sec.classList.add('active');
  main.appendChild(sec);

  const btn=document.createElement('button');
  if(idx===0) btn.classList.add('on');
  btn.dataset.go=t.id;
  btn.innerHTML=`<span class="ico">${t.ico}</span><span class="lab">${esc(t.lab)}</span>`;
  nav.appendChild(btn);
});

/* ---------- auto-tab by date ---------- */
function autoTab(){
  const now=new Date();
  const yr=now.getFullYear(), mo=now.getMonth()+1, d=now.getDate();
  let tab='arr'; // default: show arrival
  if(yr===2026 && mo===6){
    if(d===6)       tab='arr';
    else if(d<=12)  tab='finca';
    else if(d===13) tab='swap';
    else if(d<=17)  tab='picafort';
    else            tab='ret';
  } else if(new Date()>new Date('2026-06-18T23:59:00+02:00')){
    tab='ret'; // after trip — show return tab
  }
  go(tab);
}
autoTab();

/* ---------- interactions ---------- */
function go(id){
  document.querySelectorAll('section').forEach(s=>s.classList.toggle('active', s.id==='sec-'+id));
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on', b.dataset.go===id));
  document.getElementById('main').scrollTo?.(0,0);
  window.scrollTo({top:0,behavior:'smooth'});
}
let toastT;
function toast(msg){
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),1400);
}

document.addEventListener('click',(e)=>{
  const goBtn=e.target.closest('[data-go]');
  if(goBtn){ go(goBtn.dataset.go); return; }

  const seg=e.target.closest('[data-list]');
  if(seg){
    const wrap=seg.closest('.seg'); const sec=wrap.parentElement;
    wrap.querySelectorAll('button').forEach(b=>b.classList.toggle('on', b===seg));
    sec.querySelectorAll('[data-pane]').forEach(p=>p.style.display = (p.dataset.pane===seg.dataset.list)?'':'none');
    return;
  }

  const chk=e.target.closest('[data-check]');
  if(chk){
    const key=chk.dataset.check; const now=!store.get(key); store.set(key, now);
    const step=document.querySelector(`.step[data-key="${key}"]`);
    step.classList.toggle('done', now);
    step.querySelector('.node').textContent = now?'✓':'';
    chk.classList.toggle('on', now); chk.textContent = now?'✓ Zrobione':'Oznacz';
    return;
  }

  const cp=e.target.closest('[data-copy]');
  if(cp){
    const v=cp.dataset.copy;
    (navigator.clipboard?.writeText(v) || Promise.reject()).then(()=>toast('Skopiowano: '+v)).catch(()=>toast(v));
    return;
  }

  const pod=e.target.closest('[data-pod]');
  if(pod){ openPod(pod.dataset.pod); return; }
  if(e.target.id==='podCopy'){ copyPod(); return; }
  if(e.target.id==='podClose' || e.target.id==='podModal'){ closePod(); return; }
});

let curPod=null;
const podModal=document.getElementById('podModal');
function openPod(id){
  const p=PODS[id]; if(!p) return; curPod=id;
  document.getElementById('podTitle').textContent=p.title;
  document.getElementById('podBody').textContent=p.text;
  document.getElementById('podBody').scrollTop=0;
  podModal.classList.add('open');
}
function closePod(){ podModal.classList.remove('open'); }
function copyPod(){
  if(!curPod) return; const t=PODS[curPod].text;
  (navigator.clipboard?.writeText(t) || Promise.reject())
    .then(()=>toast('Skopiowano podcast — wklej do ElevenReader'))
    .catch(()=>toast('Zaznacz i skopiuj tekst ręcznie'));
}
document.addEventListener('keydown',(e)=>{ if(e.key==='Escape') closePod(); });

/* ---------- countdown ---------- */
function tickCountdown(){
  const dep=new Date('2026-06-06T10:10:00+02:00');
  const now=new Date();
  const diff=dep-now;
  const el=document.getElementById('cd');
  if(diff<=0){ el.textContent='W trakcie podróży'; return; }
  const d=Math.floor(diff/864e5), h=Math.floor(diff%864e5/36e5);
  el.textContent = d>0 ? `Do wylotu: ${d} dni ${h} h` : `Do wylotu: ${h} h`;
}
tickCountdown(); setInterval(tickCountdown,60000);

/* ---------- service worker ---------- */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
